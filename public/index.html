<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Texan Local — Staff Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--bg:#dde0e6;--md:#4a4f5e;--br:#c8cdd8}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

.hdr{background:var(--bl);border-bottom:4px solid var(--rd);padding:1rem 2rem;display:flex;align-items:center;gap:16px}
.hdr-logo{height:44px}
.hdr h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff;opacity:.85}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}

.login-box{background:#fff;border-radius:10px;width:100%;max-width:400px;box-shadow:0 6px 32px rgba(0,0,0,.15);overflow:hidden}
.login-hdr{background:var(--bl);padding:1.4rem 1.8rem;border-bottom:3px solid var(--rd)}
.login-hdr h2{font-family:'Playfair Display',serif;color:#fff;font-size:18px;margin-bottom:4px}
.login-hdr p{font-size:12px;color:rgba(255,255,255,.6)}
.login-body{padding:1.8rem}

.field{margin-bottom:1.2rem}
.field label{display:block;font-size:11px;font-weight:700;color:var(--md);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.field input{width:100%;border:none;border-bottom:2px solid var(--br);background:transparent;font-size:14px;font-family:inherit;padding:7px 2px;outline:none;transition:border-color .15s}
.field input:focus{border-bottom-color:var(--rd)}

.btn-login{width:100%;background:var(--bl);color:#fff;border:none;padding:12px;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:.4rem}
.btn-login:hover{background:#001844}
.btn-login:disabled{opacity:.6;cursor:not-allowed}

.msg{font-size:12px;margin-top:10px;padding:8px 10px;border-radius:4px;display:none}
.msg.err{background:#fff0f0;color:var(--rd);border:1px solid #ffcccc;display:block}
.msg.info{background:#f0f4ff;color:var(--bl);border:1px solid #c0ccff;display:block}

.divider{display:flex;align-items:center;gap:10px;margin:1.4rem 0;color:#aaa;font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--br)}

.btn-ms{width:100%;background:#fff;color:#1a1a2e;border:1.5px solid var(--br);padding:11px;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s}
.btn-ms:hover{background:#f5f7fb}
.ms-icon{width:18px;height:18px}

.ftr{text-align:center;padding:1.2rem;font-size:11px;color:#888}
</style>
</head>
<body>

<header class="hdr">
  <img class="hdr-logo" src="/assets/logo.png" alt="The Texan Local" onerror="this.style.display='none'">
  <h1>Staff Portal</h1>
</header>

<div class="page">
  <div class="login-box">
    <div class="login-hdr">
      <h2>Sign In</h2>
      <p>Texan Local internal portal</p>
    </div>
    <div class="login-body">

      <!-- Microsoft 365 login for staff/admin -->
      <button class="btn-ms" onclick="msLogin()">
        <svg class="ms-icon" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft 365
      </button>

      <div class="divider">or</div>

      <!-- Simple login for designer -->
      <form onsubmit="simpleLogin(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>
        <div id="msg" class="msg"></div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>

    </div>
  </div>
</div>

<div class="ftr">The Texan Local &nbsp;·&nbsp; Internal Use Only</div>

<script>
const TENANT_ID = '0e65dbc2-40cd-4dd9-a71f-9ce087852341';
const CLIENT_ID = 'f6c0d6df-40f2-4866-a8a2-003d1ebef5ac';
const BASE_URL  = window.location.origin;

// ── Check if already logged in ───────────────────────────────────────────────
async function checkAuth() {
  try {
    const res = await fetch('/api/auth/verify', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      redirectByRole(data.role);
    }
  } catch(e) {}
}

function redirectByRole(role) {
  if (role === 'designer') {
    window.location.href = '/upload';
  } else {
    window.location.href = '/home';
  }
}

// ── Microsoft 365 login ───────────────────────────────────────────────────────
function msLogin() {
  const params = new URLSearchParams({
    client_id:     CLIENT_ID,
    response_type: 'code',
    redirect_uri:  BASE_URL + '/api/auth/ms-callback',
    scope:         'openid profile email User.Read',
    response_mode: 'query',
    prompt:        'select_account'
  });
  window.location.href = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?${params}`;
}

// ── Simple login (designer) ───────────────────────────────────────────────────
async function simpleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const msg      = document.getElementById('msg');

  if (!username || !password) {
    showMsg('Please enter your username and password.', 'err');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Signing in…';
  msg.className   = 'msg';
  msg.style.display = 'none';

  try {
    const res  = await fetch('/api/auth/login', {
      method:      'POST',
      headers:     { 'Content-Type': 'application/json' },
      credentials: 'include',
      body:        JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok) {
      showMsg(data.error || 'Invalid username or password.', 'err');
    } else {
      // Store token in sessionStorage as backup
      sessionStorage.setItem('txl_token', data.token);
      sessionStorage.setItem('txl_user',  JSON.stringify({ name: data.name, role: data.role, username: data.username }));
      redirectByRole(data.role);
    }
  } catch(err) {
    showMsg('Connection error. Make sure you are online.', 'err');
  }

  btn.disabled    = false;
  btn.textContent = 'Sign In';
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent  = text;
  msg.className    = 'msg ' + type;
  msg.style.display = 'block';
}

checkAuth();
</script>
</body>
</html>
