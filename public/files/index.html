<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Texan Local — File Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--bg:#dde0e6;--md:#4a4f5e;--br:#c8cdd8;--green:#1a5c1a;--amber:#e65100}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

.hdr{background:var(--bl);border-bottom:4px solid var(--rd);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-logo{height:44px}
.hdr-l h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff}
.hdr-r{display:flex;align-items:center;gap:10px}
.btn-hdr{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 14px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.btn-hdr:hover{background:rgba(255,255,255,.2)}

.main{max-width:1300px;margin:0 auto;padding:1.5rem;flex:1}

/* ── Controls ── */
.controls{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-group label{font-size:11px;font-weight:700;color:var(--md);text-transform:uppercase;letter-spacing:.6px}
select{padding:6px 10px;border:1px solid var(--br);border-radius:4px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a2e;outline:none;cursor:pointer}
select:focus{border-color:var(--rd)}
.btn-load{background:var(--bl);color:#fff;border:none;padding:7px 18px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-load:hover{background:#001844}
.file-count{font-size:12px;color:var(--md);margin-left:auto}

/* ── Upload drop zone ── */
.upload-zone{border:2px dashed var(--br);border-radius:8px;padding:2rem;text-align:center;background:#fff;margin-bottom:1.2rem;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--rd);background:#fff8f8}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .icon{font-size:28px;margin-bottom:8px}
.upload-zone h3{font-size:15px;font-weight:700;color:var(--bl);margin-bottom:4px}
.upload-zone p{font-size:12px;color:var(--md)}
.upload-progress{margin-top:10px;font-size:12px;color:var(--green);font-weight:600;display:none}

/* ── File grid ── */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}

.file-card{background:#fff;border-radius:7px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s}
.file-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.file-thumb{height:120px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:40px;border-bottom:1px solid var(--br)}
.file-info{padding:.8rem;flex:1}
.file-name{font-size:12px;font-weight:700;color:var(--bl);word-break:break-all;margin-bottom:4px;line-height:1.4}
.file-meta{font-size:11px;color:var(--md)}
.file-actions{padding:.6rem .8rem;border-top:1px solid var(--br);display:flex;gap:6px}
.btn-sm{padding:4px 10px;border-radius:3px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-download{background:var(--bl);color:#fff}
.btn-delete{background:#f5f5f5;color:#e53935;border:1px solid #ffcdd2}
.btn-download:hover{background:#001844}
.btn-delete:hover{background:#ffebee}

/* ── Empty state ── */
.empty{text-align:center;padding:4rem 2rem;color:var(--md)}
.empty .e-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:16px;color:var(--bl);margin-bottom:8px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.err{background:var(--rd)}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <img class="hdr-logo" src="/assets/logo.png" alt="" onerror="this.style.display='none'">
    <h1>File Manager</h1>
  </div>
  <div class="hdr-r">
    <a href="/home" class="btn-hdr">← Portal Home</a>
    <button class="btn-hdr" onclick="logout()">Sign Out</button>
  </div>
</header>

<div class="main">

  <!-- Month/Year selector -->
  <div class="controls">
    <div class="ctrl-group">
      <label>Month</label>
      <select id="selMonth">
        <option value="01">January</option><option value="02">February</option>
        <option value="03">March</option><option value="04">April</option>
        <option value="05">May</option><option value="06">June</option>
        <option value="07">July</option><option value="08">August</option>
        <option value="09">September</option><option value="10">October</option>
        <option value="11">November</option><option value="12">December</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Year</label>
      <select id="selYear"></select>
    </div>
    <button class="btn-load" onclick="loadFiles()">Load Files</button>
    <div class="file-count" id="fileCount"></div>
  </div>

  <!-- Upload zone (admin only) -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf" multiple onchange="handleFiles(this.files)">
    <div class="icon">📤</div>
    <h3>Drop PDF files here to upload</h3>
    <p>or click to browse &nbsp;·&nbsp; Files are stored as <code>BusinessName_MMYY_AdType.pdf</code></p>
    <div class="upload-progress" id="uploadProgress"></div>
  </div>

  <!-- File grid -->
  <div class="file-grid" id="fileGrid">
    <div class="empty">
      <div class="e-icon">📁</div>
      <h3>Select a month and click Load Files</h3>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let userRole = 'rep';
let currentYear, currentMonth;

async function init() {
  try {
    const res  = await fetch(API + '/auth/verify', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/'; return; }
    const user = await res.json();
    userRole = user.role;
    if (user.role === 'designer') { window.location.href = '/upload'; return; }

    // Hide upload zone for reps
    if (user.role !== 'admin') {
      document.getElementById('uploadZone').style.display = 'none';
    }
  } catch(e) { window.location.href = '/'; return; }

  // Populate year selector
  const yearSel = document.getElementById('selYear');
  const thisYear = new Date().getFullYear();
  for (let y = thisYear; y >= thisYear - 3; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    yearSel.appendChild(opt);
  }

  // Default to current month (prior month for production files)
  const now = new Date();
  const prior = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  document.getElementById('selMonth').value = String(prior.getMonth() + 1).padStart(2, '0');
  document.getElementById('selYear').value  = prior.getFullYear();

  // Drag and drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  loadFiles();
}

async function loadFiles() {
  const month = document.getElementById('selMonth').value;
  const year  = document.getElementById('selYear').value;
  currentMonth = month; currentYear = year;

  const grid = document.getElementById('fileGrid');
  grid.innerHTML = '<div class="empty"><div class="e-icon">⏳</div><h3>Loading…</h3></div>';

  try {
    const res  = await fetch(`${API}/files/list?year=${year}&month=${month}`, { credentials: 'include' });
    const data = await res.json();

    if (!data.files || !data.files.length) {
      grid.innerHTML = `<div class="empty"><div class="e-icon">📭</div><h3>No files for ${month}/${year}</h3><p>Upload files using the area above</p></div>`;
      document.getElementById('fileCount').textContent = '0 files';
      return;
    }

    document.getElementById('fileCount').textContent = data.files.length + ' file' + (data.files.length !== 1 ? 's' : '');

    grid.innerHTML = data.files.map(f => `
      <div class="file-card">
        <div class="file-thumb">📄</div>
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-meta">${f.sizeLabel} &nbsp;·&nbsp; ${formatDate(f.uploadedAt)}</div>
        </div>
        <div class="file-actions">
          <button class="btn-sm btn-download" onclick="downloadFile('${esc(f.fullPath)}','${esc(f.name)}')">⬇ Download</button>
          ${userRole === 'admin' ? `<button class="btn-sm btn-delete" onclick="deleteFile('${esc(f.fullPath)}','${esc(f.name)}')">🗑</button>` : ''}
        </div>
      </div>
    `).join('');

  } catch(e) {
    grid.innerHTML = '<div class="empty"><div class="e-icon">⚠️</div><h3>Failed to load files</h3></div>';
  }
}

async function downloadFile(fullPath, name) {
  try {
    showToast('Preparing download…');
    const res  = await fetch(`${API}/files/download?path=${encodeURIComponent(fullPath)}`, { credentials: 'include' });
    const data = await res.json();
    if (!data.url) throw new Error('No URL returned');
    const a = document.createElement('a');
    a.href = data.url; a.download = name; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast('Download started!');
  } catch(e) {
    showToast('Download failed: ' + e.message, true);
  }
}

async function deleteFile(fullPath, name) {
  if (!confirm(`Delete "${name}"?\n\nThis cannot be undone.`)) return;
  try {
    const res = await fetch(`${API}/files/delete?path=${encodeURIComponent(fullPath)}`, {
      method: 'DELETE', credentials: 'include'
    });
    if (!res.ok) throw new Error('Delete failed');
    showToast('File deleted');
    loadFiles();
  } catch(e) {
    showToast('Delete failed: ' + e.message, true);
  }
}

async function handleFiles(fileList) {
  if (!fileList || !fileList.length) return;
  const prog = document.getElementById('uploadProgress');
  prog.style.display = 'block';

  for (let i = 0; i < fileList.length; i++) {
    const file = fileList[i];
    if (!file.name.toLowerCase().endsWith('.pdf')) {
      showToast(`Skipped ${file.name} — only PDFs accepted`, true);
      continue;
    }
    prog.textContent = `Uploading ${i + 1} of ${fileList.length}: ${file.name}…`;

    try {
      const b64 = await fileToBase64(file);
      const res = await fetch(`${API}/files/upload`, {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          filename:    file.name,
          fileBase64:  b64,
          contentType: 'application/pdf',
          year:        currentYear,
          month:       currentMonth
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      showToast(`✓ Uploaded: ${file.name}`);
    } catch(e) {
      showToast(`Failed: ${file.name} — ${e.message}`, true);
    }
  }

  prog.style.display = 'none';
  document.getElementById('fileInput').value = '';
  loadFiles();
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function logout() {
  await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' });
  sessionStorage.clear();
  window.location.href = '/';
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
