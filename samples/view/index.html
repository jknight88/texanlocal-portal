<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Texan Local — Digital Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--gold:#C9A84C}
body{font-family:'Georgia',serif;background:#2a2a2a;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none}

.bg-logo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:70vw;max-width:900px;opacity:.06;pointer-events:none;z-index:0;filter:grayscale(1) brightness(2)}

/* HEADER */
.viewer-hdr{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(0,32,91,.95);backdrop-filter:blur(8px);border-bottom:3px solid var(--rd);padding:.6rem 2rem;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{height:36px;width:auto}
.hdr-title{font-size:14px;color:rgba(255,255,255,.8);font-style:italic}
.hdr-meta{font-size:12px;color:rgba(255,255,255,.5);text-align:right;line-height:1.5}
.hdr-meta strong{color:var(--gold)}

/* STAGE — no side padding, book fills full width */
.stage{
  position:fixed;top:60px;bottom:60px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  z-index:1;
  padding:8px 56px;
}

/* BOOK CONTAINER — dynamic: spread 3.3846:1 or single-page 1.6923:1 (11"x6.5" per page) */
.book-container{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  /* default spread ratio; JS overrides for cover/back */
  aspect-ratio:3.3846/1;
  max-width:min(calc((100vh - 140px) * 3.3846), calc(100vw - 112px));
  width:100%;
  flex-shrink:0;
  transition:aspect-ratio 0.1s, max-width 0.1s;
}
.book-container.single-page{
  aspect-ratio:1.6923/1;
  max-width:min(calc((100vh - 140px) * 1.6923), calc((100vw - 112px) / 2));
}

/* Stack bars removed — StPageFlip handles page depth */

/* BOOK */
.book{position:absolute;inset:0;width:100%;height:100%;display:flex;overflow:visible;border-radius:0;box-shadow:none}
/* spine removed — no bar between pages */

/* PAGES */
.spread{width:100%;height:100%;display:flex;position:relative}
.page{width:50%;height:100%;position:relative;overflow:hidden;background:#fff;transition:width 0s}
/* Single-page mode: zero-width hidden page, full-width visible page */
.book-container.single-page .page[style*="visibility: hidden"],
.book-container.single-page .page[style*="visibility:hidden"]{width:0!important;overflow:hidden}
.book-container.single-page .page[style*="visibility: visible"],
.book-container.single-page .page[style*="visibility:visible"]{width:100%!important}
.page-left{border-radius:4px 0 0 4px}
.page-right{border-radius:0 4px 4px 0}

/* PAGE INNER */
.page-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.page-inner img{width:100%;height:100%;object-fit:fill;display:block;background:#fff}
.page-num{position:absolute;bottom:8px;font-size:11px;color:rgba(0,0,0,.4);font-style:italic}
.page-left .page-num{right:12px}
.page-right .page-num{left:12px}

.no-art{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8f6f2,#ede8e0);gap:12px;padding:2rem;text-align:center}
.no-art .biz-name{font-family:'Georgia',serif;font-size:clamp(14px,2.5vw,22px);font-weight:700;color:var(--bl);line-height:1.2}
.no-art .product-lbl{font-size:13px;color:#888;font-style:italic}
.no-art .tl-mark{font-size:40px;opacity:.15}

/* 3D PAGE FLIP — multi-slice curved flip like FlipHTML5 */
.book{ perspective: 2000px; transform-style: preserve-3d; }

/* Container for the slices — covers the turning half */
.flip-leaf{
  position:absolute;
  top:0; bottom:0;
  width:50%;
  z-index:20;
  pointer-events:none;
  transform-style: preserve-3d;
  overflow:hidden;
}
.flip-leaf.flip-next{ left:50%; }
.flip-leaf.flip-prev{ left:0; }

/* Each slice is a thin vertical strip of the page */
.flip-slice{
  position:absolute;
  top:0; bottom:0;
  transform-style: preserve-3d;
  transform-origin: left center;
  overflow:hidden;
  backface-visibility:hidden;
}
.flip-slice-back{
  transform: rotateY(180deg);
}

/* Shadow overlay on the static page behind the turning leaf */
.flip-shadow{
  position:absolute;
  top:0; bottom:0; width:50%;
  pointer-events:none;
  z-index:15;
  opacity:0;
}
.flip-shadow-left { left:0;   background:linear-gradient(to left, rgba(0,0,0,0.22), transparent); }
.flip-shadow-right{ right:0;  background:linear-gradient(to right, rgba(0,0,0,0.22), transparent); }

/* CONTROLS */
.controls{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:.6rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.ctrl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 20px;border-radius:4px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.ctrl-btn:hover{background:rgba(255,255,255,.2)}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed}
.page-indicator{color:rgba(255,255,255,.7);font-size:14px;font-style:italic;min-width:120px;text-align:center}
.progress-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:300px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:var(--gold);transform:scale(1.3)}
.dot:hover{background:rgba(255,255,255,.6)}
.expiry-bar{position:fixed;top:63px;left:0;right:0;z-index:49;background:rgba(201,168,76,.12);border-bottom:1px solid rgba(201,168,76,.3);padding:4px 2rem;font-size:11px;color:var(--gold);text-align:center}

/* STATE SCREENS */
.state-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;gap:1.2rem;text-align:center;padding:2rem}
.state-screen .ss-logo{height:60px;margin-bottom:.5rem}
.state-screen h2{font-size:24px;color:#fff;font-family:Georgia,serif}
.state-screen p{font-size:15px;color:rgba(255,255,255,.6);max-width:400px;line-height:1.6}
.state-screen .ss-icon{font-size:52px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV ARROWS */
.nav-arrow{position:fixed;top:50%;transform:translateY(-50%);background:rgba(0,32,91,.7);color:#fff;border:2px solid rgba(255,255,255,.3);border-radius:50%;width:48px;height:48px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:30;backdrop-filter:blur(4px)}
.nav-arrow:hover{background:rgba(0,32,91,.95);border-color:#fff;transform:translateY(-50%) scale(1.08)}
.nav-arrow:disabled{opacity:.2;cursor:not-allowed;transform:translateY(-50%)}
.nav-arrow-left{left:4px}
.nav-arrow-right{right:4px}
.sound-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:16px}
.sound-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}

@media(max-width:600px){.hdr-title{display:none}.controls{padding:.5rem 1rem}.ctrl-btn{padding:6px 12px;font-size:13px}}
/* Kill all StPageFlip structural borders */
.stf__parent,.stf__wrapper,.stf__block,.stf__item,.stf__item--soft,.stf__item--hard,
.stf__outerShadow,.stf__innerShadow,.stf__hardShadow,.stf__hardInnerShadow {
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
}
#stpfContainer * { border: none !important; outline: none !important; }
</style>
<script src="https://portal.thetexanlocal.com/assets/page-flip.browser.js"></script>

    if (data.expiresAt){
      const d=new Date(data.expiresAt);
      document.getElementById('expiryDate').textContent=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      document.getElementById('expiryBar').style.display='block';
    }

    buildDots();
    document.getElementById('loadingScreen').style.display='none';
    ['viewerHdr','stage','viewerControls'].forEach(id=>document.getElementById(id).style.display='flex');
    document.getElementById('arrowPrev').style.display='flex';
    document.getElementById('arrowNext').style.display='flex';

    renderSpread(0);
    updateStacks();
    // Init StPageFlip after viewer is visible so dimensions are correct
    requestAnimationFrame(function(){ requestAnimationFrame(initPageFlip); });

    document.addEventListener('keydown',e=>{
      if(e.key==='ArrowRight'||e.key==='ArrowDown')flipNext();
      if(e.key==='ArrowLeft' ||e.key==='ArrowUp')  flipPrev();
    });
    let tx=0;
    document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
    document.addEventListener('touchend',  e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?flipNext():flipPrev();}});

  } catch(e){console.error(e);showExpired();}
}

function showExpired(){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('expiredScreen').style.display='flex';
}

// ─── SPREADS ─────────────────────────────────────────────────────────────────
function buildSpreads(){
  spreads=[];
  if(!pages.length)return;
  if(pages.length===1){spreads.push([null,0]);return;}
  spreads.push([null,0]);
  for(let i=1;i<pages.length-1;i+=2){
    spreads.push([i,(i+1<pages.length-1)?i+1:null]);
  }
  spreads.push([pages.length-1,null]);
}

// ─── RENDER SPREAD ───────────────────────────────────────────────────────────
function renderSpread(idx){
  currentSpread=idx;
  const [li,ri]=spreads[idx];
  const lp=document.getElementById('pageLeft');
  const rp=document.getElementById('pageRight');

  // Single-page mode for cover (right only) and back cover (left only)
  const isSingle = li===null || ri===null;
  const bc = document.getElementById('bookContainer');
  if(isSingle){
    bc.classList.add('single-page');
  } else {
    bc.classList.remove('single-page');
  }

  // Spine divider: hide on single-page spreads
  const book = document.getElementById('book');
  if(book) book.classList.toggle('no-spine', isSingle);

  if(lp){
    lp.style.background = li===null?'transparent':'#fff';
    lp.style.boxShadow  = li===null?'none':'';
    lp.style.visibility = li===null?'hidden':'visible';
    // For cover (right-only), make the visible right page fill full width
    lp.style.width = (li===null && ri!==null) ? '0' : '';
  }
  if(rp){
    rp.style.background = ri===null?'transparent':'#fff';
    rp.style.boxShadow  = ri===null?'none':'';
    rp.style.visibility = ri===null?'hidden':'visible';
    // For back cover (left-only), left page fills full width
    rp.style.width = (ri===null && li!==null) ? '0' : '';
  }

  renderPage(document.getElementById('pageLeftInner'),  li, 'left');
  renderPage(document.getElementById('pageRightInner'), ri, 'right');

  let label='';
  if(idx===0){label='Cover';}
  else{
    const ln=li!==null?li+1:null,rn=ri!==null?ri+1:null;
    if(ln&&rn)label='Pages '+ln+'–'+rn;
    else if(ln)label='Page '+ln;
    else if(rn)label='Page '+rn;
  }
  document.getElementById('pageIndicator').textContent=label+' of '+pages.length;
  document.getElementById('btnPrev').disabled   =idx===0;
  document.getElementById('btnNext').disabled   =idx===spreads.length-1;
  document.getElementById('arrowPrev').disabled =idx===0;
  document.getElementById('arrowNext').disabled =idx===spreads.length-1;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  updateStacks();
}

function renderPage(container,pageIdx,side){
  container.innerHTML='';
  if(pageIdx===null){container.style.background='transparent';return;}
  container.style.background='';
  const p=pages[pageIdx];
  if(!p)return;
  if(p.imageUrl){
    const img=document.createElement('img');
    img.src=p.imageUrl;img.alt=p.business||'Ad';
    const is2P=(p.size||'').toUpperCase().startsWith('2P');
    if(is2P){
      img.style.cssText='width:200%;height:100%;object-fit:contain;display:block;background:#fff;position:absolute;top:0;';
      img.style.left=side==='left'?'0':'-100%';
      container.style.position='relative';container.style.overflow='hidden';
    } else {
      img.style.cssText='width:100%;height:100%;object-fit:fill;display:block;background:#fff';
    }
    img.onerror=function(){
      // hires (_hires.jpg) not generated yet — fall back to layout thumb
      if (p.thumbUrl && img.src !== p.thumbUrl) {
        img.src = p.thumbUrl;
      } else {
        showNoArt(container, p);
      }
    };
    container.appendChild(img);
  } else {showNoArt(container,p);}
  const num=document.createElement('div');
  num.className='page-num';num.textContent=pageIdx+1;
  container.appendChild(num);
}

function showNoArt(container,p){
  container.innerHTML='<div class="no-art"><div class="tl-mark">📰</div><div class="biz-name">'+(p.business||'Advertisement')+'</div><div class="product-lbl">'+(p.product||'')+'</div></div>';
}

// ─── STACKS ───────────────────────────────────────────────────────────────────
function buildDots(){
  var dots = document.getElementById('progressDots');
  if(!dots) return;
  dots.innerHTML = spreads.map(function(_,i){
    return '<div class="dot'+(i===currentSpread?' active':'')+'" onclick="goTo('+i+')" title="Spread '+(i+1)+'"></div>';
  }).join('');
}
function goTo(idx){ if(idx===currentSpread)return; doFlip(idx>currentSpread?'next':'prev'); }
function updateStacks(){
  if (!document.getElementById('stackLeft')) return;
  const done=currentSpread,remain=spreads.length-currentSpread-1;
  const mk=(n,max)=>{let h='';for(let i=0;i<Math.max(1,Math.min(n,max));i++)h+='<div class="stack-slice"></div>';return h;};
  document.getElementById('stackLeft').innerHTML =mk(done*3,24);
  document.getElementById('stackRight').innerHTML=mk(remain*3,24);
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let _ctx = null, _buf = null, _decoding = false, _pendingPlay = false;

function _initAudio() {
  if (_ctx) { if (_ctx.state === 'suspended') _ctx.resume(); return; }
  try {
    _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (_decoding) return;
    _decoding = true;
    // Fetch the base64 WAV and decode via XHR blob URL for maximum compatibility
    var b64 = FLIP_SRC.split(',')[1];
    var raw = atob(b64);
    var ab  = new ArrayBuffer(raw.length);
    var u8  = new Uint8Array(ab);
    for (var i = 0; i < raw.length; i++) u8[i] = raw.charCodeAt(i);
    var promise = _ctx.decodeAudioData(ab);
    if (promise && promise.then) {
      promise.then(function(buf){
        _buf = buf; _decoding = false;
        if (_pendingPlay) { _pendingPlay = false; _playFlipSound(); }
      }).catch(function(e){ console.error('Audio decode failed:', e); _decoding = false; });
    }
  } catch(e) { console.warn('Audio init:', e); }
}

function _playFlipSound() {
  if (!soundEnabled) return;
  if (!_buf) { _pendingPlay = true; return; }  // buffer not ready yet — play when decoded
  try {
    if (_ctx.state === 'suspended') _ctx.resume();
    const s = _ctx.createBufferSource();
    const g = _ctx.createGain();
    s.buffer = _buf; g.gain.value = 0.8;
    s.connect(g); g.connect(_ctx.destination);
    s.start(0);
  } catch(e) {}
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  _initAudio();
}

// ─── PAGE FLIP via StPageFlip ─────────────────────────────────────────────────
let pageFlipInstance = null;
let pageW = 0, pageH = 0, stpfContainer = null;

function flipNext(){
  if(!pageFlipInstance)return;
  _initAudio();
  _playFlipSound();
  pageFlipInstance.flipNext();
}
function flipPrev(){
  if(!pageFlipInstance)return;
  _initAudio();
  _playFlipSound();
  pageFlipInstance.flipPrev();
}
function doFlip(dir){ if(dir==='next') flipNext(); else flipPrev(); }

function _updateCoverPosition(pgIdx) {
  if (!stpfContainer) return;
  // Cover (pg 0) is on RIGHT half — shift left to center it
  // Back cover (last page) is on LEFT half — shift right to center it
  // Interior spreads — no shift
  var isFirst = pgIdx === 0;
  var isLast  = pgIdx >= pages.length - 1;
  if (isFirst) {
    // showCover:true — cover (page 0) is on RIGHT half of container
    // Shift container LEFT by pageW/2 to center the cover in the stage
    stpfContainer.style.transform = 'translateX(-' + Math.floor(pageW/2) + 'px)';
  } else if (isLast) {
    // Back cover on LEFT half — shift container RIGHT by pageW/2
    stpfContainer.style.transform = 'translateX(' + Math.floor(pageW/2) + 'px)';
  } else {
    stpfContainer.style.transform = '';
  }
}

function initPageFlip() {
  const stage  = document.getElementById('stage');
  const stageW = stage.offsetWidth;
  const stageH = stage.offsetHeight;

  // Page ratio: 11" x 6.5"
  const SPREAD_RATIO = 22 / 6.5;
  const padX = 80, padY = 20;
  let spreadW = stageW - padX;
  let spreadH = spreadW / SPREAD_RATIO;
  if (spreadH > stageH - padY) {
    spreadH = stageH - padY;
    spreadW = spreadH * SPREAD_RATIO;
  }
  pageW = Math.floor(spreadW / 2);
  pageH = Math.floor(spreadH);

  // Build page divs with images
  const pageEls = pages.map(function(p, i) {
    const div = document.createElement('div');
    div.className = 'stpf-page';
    // No hard density — all pages use soft flip for consistent curved animation
    div.style.cssText = 'background:#fff;overflow:hidden;width:100%;height:100%';
    var img = document.createElement('img');
    img.src = p.imageUrl || p.thumbUrl || '';
    img.style.cssText = 'width:100%;height:100%;object-fit:fill;display:block';
    div.appendChild(img);
    return div;
  });

  // Clear book and set up StPageFlip container
  const book = document.getElementById('book');
  book.innerHTML = '';
  book.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:visible;background:transparent';

  stpfContainer = document.createElement('div');
  stpfContainer.id = 'stpfContainer';
  stpfContainer.style.cssText = 'width:'+(pageW*2)+'px;height:'+pageH+'px;position:relative;flex-shrink:0;overflow:hidden;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.5);transition:transform 0.35s ease';
  pageEls.forEach(function(el){ stpfContainer.appendChild(el); });
  book.appendChild(stpfContainer);

  try {
    pageFlipInstance = new St.PageFlip(stpfContainer, {
      width:               pageW,
      height:              pageH,
      size:                'fixed',
      drawShadow:          true,
      flippingTime:        700,
      usePortrait:         false,
      autoSize:            false,
      maxShadowOpacity:    0.5,
      showCover:           true,
      startPage:           0,
      mobileScrollSupport: false,
      disableFlipByClick:  true,
      useMouseEvents:      false
    });

    pageFlipInstance.loadFromHTML(stpfContainer.querySelectorAll('.stpf-page'));

    // Override hard density on cover/back pages so they flip softly like interior pages
    try {
      var pc = pageFlipInstance.getPageCount();
      for (var pi = 0; pi < pc; pi++) {
        pageFlipInstance.getPage(pi).setDensity('soft');
      }
    } catch(e) { console.warn('Could not override density:', e); }

    pageFlipInstance.on('flip', function(e){
      // Sound now played on button press (start of flip), not here (end)
      var pg = e.data;
      if (pg === 0) currentSpread = 0;
      else if (pg >= pages.length - 1) currentSpread = spreads.length - 1;
      else currentSpread = Math.ceil(pg / 2);
      buildDots();
      _updateCoverPosition(pg);
      // Sync prev/next button state with StPageFlip page index
      var atFirst = pg === 0;
      var atLast  = pg >= pages.length - 1;
      document.getElementById('btnPrev').disabled   = atFirst;
      document.getElementById('btnNext').disabled   = atLast;
      document.getElementById('arrowPrev').disabled = atFirst;
      document.getElementById('arrowNext').disabled = atLast;
    });

    pageFlipInstance.on('init', function(){
      // Center cover on init
      setTimeout(function(){ _updateCoverPosition(0); }, 50);
      // Inject CSS to remove the spine line StPageFlip draws
      if (!document.getElementById('stpfKill')) {
        var s = document.createElement('style');
        s.id = 'stpfKill';
        s.textContent = [
          '#stpfContainer *{border:none!important;outline:none!important;box-shadow:none!important}',
          '.stf__parent,.stf__wrapper,.stf__block{border:none!important;outline:none!important}',
          '.stf__outerShadow,.stf__innerShadow,.stf__hardShadow,.stf__hardInnerShadow{border:none!important}'
        ].join(' ');
        document.head.appendChild(s);
      }
    });

  } catch(err) {
    console.error('StPageFlip init failed:', err);
    // Fallback: restore original book HTML
    book.innerHTML = '<div class="spread" id="spread"><div class="page page-left" id="pageLeft"><div class="page-inner" id="pageLeftInner"></div></div><div class="page page-right" id="pageRight"><div class="page-inner" id="pageRightInner"></div></div></div><div class="flip-shadow flip-shadow-left" id="shadowLeft"></div><div class="flip-shadow flip-shadow-right" id="shadowRight"></div>';
    renderSpread(currentSpread);
  }
}


init();
</script>
</body>
