<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Texan Local — Digital Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--gold:#C9A84C}
body{font-family:'Georgia',serif;background:#2a2a2a;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none}
.bg-logo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:70vw;max-width:900px;opacity:.06;pointer-events:none;z-index:0;filter:grayscale(1) brightness(2)}
.viewer-hdr{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(0,32,91,.95);backdrop-filter:blur(8px);border-bottom:3px solid var(--rd);padding:.6rem 2rem;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{height:36px;width:auto}
.hdr-title{font-size:14px;color:rgba(255,255,255,.8);font-style:italic}
.hdr-meta{font-size:12px;color:rgba(255,255,255,.5);text-align:right;line-height:1.5}
.hdr-meta strong{color:var(--gold)}
.stage{position:fixed;top:60px;bottom:60px;left:0;right:0;display:flex;align-items:center;justify-content:center;z-index:1;perspective:2000px;padding:0 70px}
.book-container{position:relative;display:flex;align-items:center;justify-content:center;aspect-ratio:3.538/1;max-width:min(calc((100vh - 140px) * 3.538), calc(100vw - 140px));width:100%;flex-shrink:0}

/* FIX 1: Stack bars — thin, outer edge only */
.stack{position:absolute;top:4px;bottom:4px;width:3px;display:flex;flex-direction:column;gap:1px;overflow:hidden;border-radius:1px}
.stack-left{left:-5px}
.stack-right{right:-5px}
.stack-slice{flex:1;background:#ccc5b8;border-left:1px solid #aaa090;border-right:none;transition:flex .3s ease}
.stack-right .stack-slice{background:#ccc5b8;border-left:none;border-right:1px solid #aaa090}

.book{position:absolute;inset:0;width:100%;height:100%;transform-style:preserve-3d;display:flex}
.book::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:12px;transform:translateX(-50%);background:linear-gradient(90deg,rgba(0,0,0,.18),rgba(0,0,0,.08),rgba(0,0,0,.18));z-index:10;pointer-events:none}
.spread{width:100%;height:100%;display:flex;position:relative}
.page{width:50%;height:100%;position:relative;overflow:hidden;background:#fff}
.page-left{border-radius:4px 0 0 4px;box-shadow:-4px 0 20px rgba(0,0,0,.3)}
.page-right{border-radius:0 4px 4px 0;box-shadow:4px 0 20px rgba(0,0,0,.3)}
.page-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.page-inner img{width:100%;height:100%;object-fit:contain;display:block;background:#fff}
.page-num{position:absolute;bottom:8px;font-size:11px;color:rgba(0,0,0,.4);font-style:italic}
.page-left .page-num{right:12px}
.page-right .page-num{left:12px}
.no-art{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8f6f2,#ede8e0);gap:12px;padding:2rem;text-align:center}
.no-art .biz-name{font-family:'Georgia',serif;font-size:clamp(14px,2.5vw,22px);font-weight:700;color:var(--bl);line-height:1.2}
.no-art .product-lbl{font-size:13px;color:#888;font-style:italic}
.no-art .tl-mark{font-size:40px;opacity:.15}
.page-flip{position:absolute;top:0;height:100%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.645,.045,.355,1);z-index:20;transform-origin:left center}
.page-flip.right-origin{transform-origin:right center}
.page-flip .face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;overflow:hidden}
.page-flip .face-back{transform:rotateY(180deg)}
.page-flip::after{content:'';position:absolute;top:0;bottom:0;width:30px;background:linear-gradient(90deg,rgba(0,0,0,.2),transparent);pointer-events:none;z-index:30;opacity:0;transition:opacity .3s}
.page-flip.animating::after{opacity:1}
.controls{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:.6rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.ctrl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 20px;border-radius:4px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.ctrl-btn:hover{background:rgba(255,255,255,.2)}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed}
.page-indicator{color:rgba(255,255,255,.7);font-size:14px;font-style:italic;min-width:120px;text-align:center}
.progress-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:300px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:var(--gold);transform:scale(1.3)}
.dot:hover{background:rgba(255,255,255,.6)}
.expiry-bar{position:fixed;top:63px;left:0;right:0;z-index:49;background:rgba(201,168,76,.12);border-bottom:1px solid rgba(201,168,76,.3);padding:4px 2rem;font-size:11px;color:var(--gold);text-align:center}
.state-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;gap:1.2rem;text-align:center;padding:2rem}
.state-screen .ss-logo{height:60px;margin-bottom:.5rem}
.state-screen h2{font-size:24px;color:#fff;font-family:Georgia,serif}
.state-screen p{font-size:15px;color:rgba(255,255,255,.6);max-width:400px;line-height:1.6}
.state-screen .ss-icon{font-size:52px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.nav-arrow{position:fixed;top:50%;transform:translateY(-50%);background:rgba(0,32,91,.7);color:#fff;border:2px solid rgba(255,255,255,.3);border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:30;backdrop-filter:blur(4px)}
.nav-arrow:hover{background:rgba(0,32,91,.95);border-color:#fff;transform:translateY(-50%) scale(1.08)}
.nav-arrow:disabled{opacity:.2;cursor:not-allowed;transform:translateY(-50%)}
.nav-arrow-left{left:8px}
.nav-arrow-right{right:8px}
.sound-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:16px}
.sound-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}
@media(max-width:600px){.hdr-title{display:none}.controls{padding:.5rem 1rem}.ctrl-btn{padding:6px 12px;font-size:13px}}
</style>
</head>
<body>

<img class="bg-logo" id="bgLogo" src="" alt="">

<div class="state-screen" id="loadingScreen">
  <img class="ss-logo" id="loadLogo" src="" alt="Texan Local">
  <div class="spinner"></div>
  <h2>Loading Magazine…</h2>
  <p>Preparing your edition of the Texan Local</p>
</div>

<div class="state-screen" id="expiredScreen" style="display:none">
  <img class="ss-logo" id="expLogo" src="" alt="Texan Local">
  <div class="ss-icon">📅</div>
  <h2>This Preview Has Expired</h2>
  <p>This digital magazine link is no longer active. Contact us for the latest edition of the Texan Local.</p>
  <a href="https://thetexanlocal.com" style="background:var(--rd);color:#fff;padding:10px 24px;border-radius:5px;text-decoration:none;font-size:14px;font-weight:700;margin-top:.5rem">Visit Texan Local →</a>
</div>

<div class="expiry-bar" id="expiryBar" style="display:none">
  📅 This preview link expires on <strong id="expiryDate"></strong>
</div>

<header class="viewer-hdr" id="viewerHdr" style="display:none">
  <img class="hdr-logo" id="hdrLogo" src="" alt="Texan Local">
  <div class="hdr-title" id="hdrTitle">Digital Edition Preview</div>
  <div class="hdr-meta">
    <div id="hdrZone"></div>
    <strong id="hdrMonth"></strong>
  </div>
</header>

<button class="nav-arrow nav-arrow-left"  id="arrowPrev" onclick="flipPrev()" style="display:none">&#8249;</button>
<button class="nav-arrow nav-arrow-right" id="arrowNext" onclick="flipNext()" style="display:none">&#8250;</button>

<div class="stage" id="stage" style="display:none">
  <div class="book-container" id="bookContainer">
    <div class="stack stack-left"  id="stackLeft"></div>
    <div class="book" id="book">
      <div class="spread" id="spread">
        <div class="page page-left"  id="pageLeft"><div class="page-inner" id="pageLeftInner"></div></div>
        <div class="page page-right" id="pageRight"><div class="page-inner" id="pageRightInner"></div></div>
      </div>
    </div>
    <div class="stack stack-right" id="stackRight"></div>
  </div>
</div>

<div class="controls" id="viewerControls" style="display:none">
  <button class="ctrl-btn" id="btnPrev" onclick="flipPrev()">← Previous</button>
  <div style="display:flex;align-items:center;gap:1rem;flex:1;justify-content:center">
    <div class="progress-dots" id="progressDots"></div>
    <div class="page-indicator" id="pageIndicator">Page 1</div>
  </div>
  <button class="sound-btn" id="soundBtn" onclick="toggleSound()" title="Toggle flip sound">🔊</button>
  <button class="ctrl-btn" id="btnNext" onclick="flipNext()">Next →</button>
</div>

<script>
const API      = '/api';
const LOGO_URL = '/assets/logo.png';

let pages         = [];
let spreads       = [];
let currentSpread = 0;
let soundEnabled  = true;
let isFlipping    = false;
let flipAudio     = null;

async function init() {
  ['bgLogo','loadLogo','expLogo','hdrLogo'].forEach(function(id){ document.getElementById(id).src = LOGO_URL; });

  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const token = pathParts.filter(function(p){ return p !== 'v' && p !== 'samples'; }).pop() || '';

  if (!token) {
    document.getElementById('loadingScreen').innerHTML =
      '<img class="ss-logo" src="/assets/logo.png" alt="Texan Local" style="height:60px;margin-bottom:1rem">'+
      '<div class="ss-icon">📖</div>'+
      '<h2 style="color:#fff;font-family:Georgia,serif">Digital Magazine Preview</h2>'+
      '<p style="color:rgba(255,255,255,.6);max-width:400px;line-height:1.6">This link requires a valid preview token.</p>'+
      '<a href="https://thetexanlocal.com" style="background:#BF0D3E;color:#fff;padding:10px 24px;border-radius:5px;text-decoration:none;font-size:14px;font-weight:700;margin-top:.5rem;display:inline-block">Visit Texan Local →</a>';
    return;
  }

  try {
    const res  = await fetch(API + '/getFlipbook?token=' + encodeURIComponent(token));
    const data = await res.json();
    if (res.status === 410 || data.error === 'expired') { showExpired(); return; }
    if (!res.ok || !data.ok) { showExpired(); return; }
    pages = data.pages || [];
    if (!pages.length) { showExpired(); return; }

    buildSpreads();
    document.getElementById('hdrTitle').textContent = data.title || 'Digital Edition';
    document.getElementById('hdrZone').textContent  = data.zone;
    document.getElementById('hdrMonth').textContent = data.monthName;

    if (data.expiresAt) {
      const d = new Date(data.expiresAt);
      document.getElementById('expiryDate').textContent = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      document.getElementById('expiryBar').style.display = 'block';
    }

    buildDots();
    ['viewerHdr','stage','viewerControls'].forEach(function(id){ document.getElementById(id).style.display='flex'; });
    document.getElementById('arrowPrev').style.display = 'flex';
    document.getElementById('arrowNext').style.display = 'flex';
    document.getElementById('loadingScreen').style.display = 'none';

    initAudio();
    renderSpread(0);
    updateStacks();

    document.addEventListener('keydown', function(e){
      if (e.key==='ArrowRight'||e.key==='ArrowDown') flipNext();
      if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   flipPrev();
    });
    let tx = 0;
    document.addEventListener('touchstart', function(e){ tx = e.touches[0].clientX; });
    document.addEventListener('touchend',   function(e){ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50){dx<0?flipNext():flipPrev();} });
  } catch(e) { console.error(e); showExpired(); }
}

function showExpired() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('expiredScreen').style.display = 'flex';
}

function buildSpreads() {
  spreads = [];
  if (!pages.length) return;
  if (pages.length === 1) { spreads.push([null,0]); return; }
  spreads.push([null, 0]);
  for (let i=1; i<pages.length-1; i+=2) {
    spreads.push([i, (i+1<pages.length-1)?i+1:null]);
  }
  spreads.push([pages.length-1, null]);
}

function renderSpread(idx) {
  currentSpread = idx;
  const [li, ri] = spreads[idx];
  const lp = document.getElementById('pageLeft');
  const rp = document.getElementById('pageRight');

  /* FIX 3: visibility:hidden hides shadow/border too on blank cover side */
  if (lp) {
    lp.style.background  = li===null ? 'transparent' : '#fff';
    lp.style.boxShadow   = li===null ? 'none' : '';
    lp.style.visibility  = li===null ? 'hidden' : 'visible';
  }
  if (rp) {
    rp.style.background  = ri===null ? 'transparent' : '#fff';
    rp.style.boxShadow   = ri===null ? 'none' : '';
    rp.style.visibility  = ri===null ? 'hidden' : 'visible';
  }

  renderPage(document.getElementById('pageLeftInner'),  li, 'left');
  renderPage(document.getElementById('pageRightInner'), ri, 'right');

  let label = '';
  if (idx===0) { label='Cover'; }
  else {
    const ln=li!==null?li+1:null, rn=ri!==null?ri+1:null;
    if (ln&&rn) label='Pages '+ln+'–'+rn;
    else if (ln) label='Page '+ln;
    else if (rn) label='Page '+rn;
  }
  document.getElementById('pageIndicator').textContent = label+' of '+pages.length;
  document.getElementById('btnPrev').disabled   = idx===0;
  document.getElementById('btnNext').disabled   = idx===spreads.length-1;
  document.getElementById('arrowPrev').disabled = idx===0;
  document.getElementById('arrowNext').disabled = idx===spreads.length-1;
  document.querySelectorAll('.dot').forEach(function(d,i){ d.classList.toggle('active',i===idx); });
  updateStacks();
}

function renderPage(container, pageIdx, side) {
  container.innerHTML = '';
  if (pageIdx===null) { container.style.background='transparent'; return; }
  container.style.background = '';
  const p = pages[pageIdx];
  if (!p) return;
  if (p.imageUrl) {
    const img = document.createElement('img');
    img.src = p.imageUrl; img.alt = p.business||'Ad';
    const is2P = (p.size||'').toUpperCase().startsWith('2P');
    if (is2P) {
      img.style.cssText='width:200%;height:100%;object-fit:contain;display:block;background:#fff;position:absolute;top:0;';
      img.style.left = side==='left'?'0':'-100%';
      container.style.position='relative'; container.style.overflow='hidden';
    } else {
      img.style.cssText='width:100%;height:100%;object-fit:contain;display:block;background:#fff';
    }
    img.onerror = function(){ showNoArt(container,p); };
    container.appendChild(img);
  } else { showNoArt(container,p); }
  const num = document.createElement('div');
  num.className='page-num'; num.textContent=pageIdx+1;
  container.appendChild(num);
}

function showNoArt(container, p) {
  container.innerHTML='<div class="no-art"><div class="tl-mark">📰</div><div class="biz-name">'+(p.business||'Advertisement')+'</div><div class="product-lbl">'+(p.product||'')+'</div></div>';
}

function updateStacks() {
  const done=currentSpread, remain=spreads.length-currentSpread-1;
  const mk=function(n,max){ let h=''; for(let i=0;i<Math.max(1,Math.min(n,max));i++) h+='<div class="stack-slice"></div>'; return h; };
  document.getElementById('stackLeft').innerHTML  = mk(done*3,24);
  document.getElementById('stackRight').innerHTML = mk(remain*3,24);
}

function flipNext(){ if(isFlipping||currentSpread>=spreads.length-1)return; doFlip('next'); }
function flipPrev(){ if(isFlipping||currentSpread<=0)return; doFlip('prev'); }

function doFlip(dir) {
  isFlipping=true; playFlipSound();
  const next=dir==='next'?currentSpread+1:currentSpread-1;
  const [nl,nr]=spreads[next];
  const el=document.createElement('div');
  el.className='page-flip'+(dir==='prev'?' right-origin':'');
  const ff=document.createElement('div'); ff.className='face face-front';
  const fb=document.createElement('div'); fb.className='face face-back';
  if (dir==='next') {
    renderPage(ff,spreads[currentSpread][1],'right'); renderPage(fb,nl,'left');
    el.style.left='50%'; el.style.width='50%'; el.style.height='100%';
  } else {
    renderPage(ff,spreads[currentSpread][0],'left'); renderPage(fb,nr,'right');
    el.style.right='50%'; el.style.left='0'; el.style.width='50%'; el.style.height='100%';
  }
  el.appendChild(ff); el.appendChild(fb);
  document.getElementById('book').appendChild(el);
  el.classList.add('animating');
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    if(dir==='next'){ el.style.transform='rotateY(-180deg)'; }
    else { el.style.transformOrigin='right center'; el.style.transform='rotateY(180deg)'; }
  }); });
  setTimeout(function(){ el.remove(); renderSpread(next); isFlipping=false; }, 620);
}

/* FIX 2: new Audio(WAV_SRC) per play — cloneNode() drops base64 src */
function initAudio() {
  try {
    const WAV_SRC = 'data:audio/wav;base64,UklGRn5NAABXQVZFZm10IBAAAAABAAIAgLsAAABlBAAEABgAZGF0YVpNAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA';
    flipAudio = function(){
      const snd = new Audio(WAV_SRC);
      snd.volume = 0.7;
      snd.play().catch(function(){});
    };
  } catch(e){ flipAudio=function(){}; }
}

function playFlipSound(){ if(!soundEnabled||!flipAudio)return; try{ flipAudio(); }catch(e){} }
function toggleSound(){ soundEnabled=!soundEnabled; document.getElementById('soundBtn').textContent=soundEnabled?'🔊':'🔇'; }

function buildDots() {
  const c=document.getElementById('progressDots'); c.innerHTML='';
  if(spreads.length<=20){
    spreads.forEach(function(_,i){
      const d=document.createElement('div');
      d.className='dot'+(i===0?' active':'');
      d.onclick=function(){ if(!isFlipping)jumpToSpread(i); };
      c.appendChild(d);
    });
  }
}

function jumpToSpread(idx){ if(idx===currentSpread||isFlipping)return; playFlipSound(); renderSpread(idx); }

init();
</script>
</body>
</html>
