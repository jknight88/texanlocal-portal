<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Texan Local — File Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--bg:#dde0e6;--md:#4a4f5e;--br:#c8cdd8;--green:#1a5c1a}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--bl);border-bottom:4px solid var(--rd);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-logo{height:44px}
.hdr-l h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff}
.hdr-r{display:flex;align-items:center;gap:10px}
.btn-hdr{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 14px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.btn-hdr:hover{background:rgba(255,255,255,.2)}
.main{max-width:1400px;margin:0 auto;padding:1.5rem;flex:1;width:100%}
.controls{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-group label{font-size:11px;font-weight:700;color:var(--md);text-transform:uppercase;letter-spacing:.6px}
select{padding:6px 10px;border:1px solid var(--br);border-radius:4px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a2e;outline:none;cursor:pointer}
select:focus{border-color:var(--rd)}
.file-count{font-size:12px;color:var(--md);margin-left:auto}
.month-tabs{display:flex;gap:0;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:1.2rem;flex-wrap:wrap}
.month-tab{flex:1;min-width:60px;padding:.6rem .4rem;font-size:12px;font-weight:700;color:var(--md);cursor:pointer;border-right:1px solid #f0f2f5;text-align:center;transition:all .15s;user-select:none}
.month-tab:last-child{border-right:none}
.month-tab:hover{background:#f5f8ff;color:var(--bl)}
.month-tab.active{background:var(--bl);color:#fff}
.upload-zone{border:2px dashed var(--br);border-radius:8px;padding:1.2rem 2rem;text-align:center;background:#fff;margin-bottom:1.2rem;cursor:pointer;transition:all .2s;position:relative;display:flex;align-items:center;gap:16px;justify-content:center}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--rd);background:#fff8f8}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .icon{font-size:22px}
.upload-zone p{font-size:13px;color:var(--md)}
.upload-zone strong{color:var(--bl)}
.upload-progress{font-size:12px;color:var(--green);font-weight:600;display:none;margin-left:12px}
.workspace{display:flex;gap:1rem;align-items:flex-start;min-height:500px}
.file-list-wrap{flex:1;min-width:0;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden}
.file-table{width:100%;border-collapse:collapse}
.file-table thead{background:var(--bl)}
.file-table thead th{color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;text-align:left}
.file-table tbody tr{border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .1s}
.file-table tbody tr:hover{background:#f5f8ff}
.file-table tbody tr.active{background:#e8ecf8;border-left:3px solid var(--rd)}
.file-table tbody tr:last-child{border-bottom:none}
.file-table td{padding:10px 14px;font-size:13px;vertical-align:middle}
.td-icon{width:32px;font-size:18px;color:var(--rd)}
.td-name{font-weight:600;color:var(--bl)}
.td-size{color:var(--md);font-size:12px;white-space:nowrap}
.td-date{color:var(--md);font-size:12px;white-space:nowrap}
.td-actions{white-space:nowrap;text-align:right}
.btn-sm{padding:4px 10px;border-radius:3px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:4px}
.btn-view{background:#f0f4ff;color:var(--bl);border:1px solid #c0ccff}
.btn-view:hover{background:#dde5ff}
.btn-download{background:var(--bl);color:#fff}
.btn-download:hover{background:#001844}
.btn-delete{background:#fff0f0;color:#e53935;border:1px solid #ffcdd2}
.btn-delete:hover{background:#ffebee}
.preview-panel{width:520px;flex-shrink:0;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);overflow:hidden;position:sticky;top:1rem;display:none;flex-direction:column;max-height:calc(100vh - 120px)}
.preview-panel.visible{display:flex}
.preview-hdr{background:var(--bl);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:3px solid var(--rd)}
.preview-hdr span{color:#fff;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-actions{display:flex;gap:6px;flex-shrink:0}
.btn-preview-action{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-preview-action:hover{background:rgba(255,255,255,.25)}
/* Preview content auto-sizes */
.preview-content{overflow:auto;flex:1;display:flex;align-items:flex-start;justify-content:center;background:#f5f5f5}
.preview-content iframe{width:100%;height:100%;border:none;display:block;min-height:400px}
.preview-content img{max-width:100%;height:auto;display:block}
.preview-empty{padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--md);gap:12px;text-align:center;width:100%}
.preview-empty .pi{font-size:48px}
.empty-state{padding:4rem 2rem;text-align:center;color:var(--md)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;color:var(--bl);margin-bottom:6px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.err{background:var(--rd)}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-l">
    <img class="hdr-logo" src="/assets/logo.png" alt="" onerror="this.style.display='none'">
    <h1>File Manager</h1>
  </div>
  <div class="hdr-r">
    <a href="/home" class="btn-hdr">← Portal Home</a>
    <button class="btn-hdr" onclick="logout()">Sign Out</button>
  </div>
</header>
<div class="main">
  <div class="controls">
    <div class="ctrl-group">
      <label>Year</label>
      <select id="selYear" onchange="renderMonthTabs()"></select>
    </div>
    <div class="file-count" id="fileCount"></div>
  </div>
  <div class="month-tabs" id="monthTabs"></div>
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf" multiple onchange="handleFiles(this.files)">
    <span class="icon">📤</span>
    <p><strong>Drop PDFs here</strong> to upload &nbsp;·&nbsp; or click to browse</p>
    <span class="upload-progress" id="uploadProgress"></span>
  </div>
  <div class="workspace">
    <div class="file-list-wrap">
      <div id="fileListContainer">
        <div class="empty-state"><div class="ei">📁</div><h3>Select a month above to view files</h3></div>
      </div>
    </div>
    <div class="preview-panel" id="previewPanel">
      <div class="preview-hdr">
        <span id="previewName">Preview</span>
        <div class="preview-actions">
          <button class="btn-preview-action" onclick="openFullWindow()">⛶ Full View</button>
          <button class="btn-preview-action" onclick="downloadCurrent()">⬇ Download</button>
          <button class="btn-preview-action" onclick="closePreview()">✕</button>
        </div>
      </div>
      <div class="preview-content" id="previewContent">
        <div class="preview-empty"><div class="pi">📄</div><p>Click a file to preview</p></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = '/api';
let userRole = 'rep';
let currentYear, currentMonth;
let currentPreviewPath = null;
let currentPreviewName = null;
let currentPreviewUrl  = null;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

async function init() {
  try {
    const token = sessionStorage.getItem('txl_token');
    const res = await fetch(API + '/authVerify' + (token ? '?token=' + token : ''), { credentials:'include' });
    if (!res.ok) { window.location.href='/'; return; }
    const user = await res.json();
    userRole = user.role;
    if (user.role !== 'admin') document.getElementById('uploadZone').style.display = 'none';
  } catch(e) { window.location.href='/'; return; }

  const yearSel  = document.getElementById('selYear');
  const thisYear = new Date().getFullYear();
  for (let y = thisYear; y >= thisYear-3; y--) {
    const o = document.createElement('option');
    o.value=y; o.textContent=y; yearSel.appendChild(o);
  }
  yearSel.value = thisYear;

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover',  e=>{ e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', ()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e=>{ e.preventDefault(); zone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

  renderMonthTabs();
  const now = new Date();
  selectMonth(String(now.getMonth()+1).padStart(2,'0'));
}

function renderMonthTabs() {
  const year = document.getElementById('selYear').value;
  const now  = new Date();
  document.getElementById('monthTabs').innerHTML = MONTHS.map((m,i) => {
    const monthNum  = String(i+1).padStart(2,'0');
    const isFuture  = parseInt(year)===now.getFullYear() && i>now.getMonth();
    return '<div class="month-tab'+(currentMonth===monthNum?' active':'')+
      (isFuture?' style="opacity:.4;pointer-events:none"':'')+
      '" onclick="selectMonth(\''+monthNum+'\')">'+m+'</div>';
  }).join('');
}

function selectMonth(month) {
  currentMonth = month;
  currentYear  = document.getElementById('selYear').value;
  document.querySelectorAll('.month-tab').forEach((t,i)=>{
    t.classList.toggle('active', String(i+1).padStart(2,'0')===month);
  });
  closePreview();
  loadFiles();
}

async function loadFiles() {
  const month=currentMonth, year=currentYear;
  if (!month||!year) return;
  closePreview();
  const container = document.getElementById('fileListContainer');
  container.innerHTML = '<div class="empty-state"><div class="ei">⏳</div><h3>Loading…</h3></div>';
  try {
    const res  = await fetch(API+'/filesListFiles?year='+year+'&month='+month, { credentials:'include' });
    const data = await res.json();
    if (!data.files||!data.files.length) {
      container.innerHTML='<div class="empty-state"><div class="ei">📭</div><h3>No files for '+month+'/'+year+'</h3></div>';
      document.getElementById('fileCount').textContent='0 files'; return;
    }
    document.getElementById('fileCount').textContent=data.files.length+' file'+(data.files.length!==1?'s':'');
    container.innerHTML='<table class="file-table"><thead><tr>'+
      '<th style="width:32px"></th><th>File Name</th><th>Size</th><th>Uploaded</th>'+
      '<th style="text-align:right">Actions</th></tr></thead><tbody>'+
      data.files.map(function(f) {
        return '<tr id="row-'+safeId(f.fullPath)+'" onclick="previewFile(\''+esc(f.fullPath)+'\',\''+esc(f.name)+'\')">'+
          '<td class="td-icon">📄</td>'+
          '<td class="td-name">'+esc(f.name)+'</td>'+
          '<td class="td-size">'+f.sizeLabel+'</td>'+
          '<td class="td-date">'+formatDate(f.uploadedAt)+'</td>'+
          '<td class="td-actions" onclick="event.stopPropagation()">'+
            '<button class="btn-sm btn-view" onclick="previewFile(\''+esc(f.fullPath)+'\',\''+esc(f.name)+'\')">👁 Preview</button>'+
            '<button class="btn-sm btn-download" onclick="downloadFile(\''+esc(f.fullPath)+'\',\''+esc(f.name)+'\')">⬇</button>'+
            (userRole==='admin'?'<button class="btn-sm btn-delete" onclick="deleteFile(\''+esc(f.fullPath)+'\',\''+esc(f.name)+'\')">🗑</button>':'')+
          '</td></tr>';
      }).join('')+'</tbody></table>';
  } catch(e) {
    container.innerHTML='<div class="empty-state"><div class="ei">⚠️</div><h3>Failed to load files</h3></div>';
  }
}

async function previewFile(fullPath, name) {
  document.querySelectorAll('.file-table tbody tr').forEach(r=>r.classList.remove('active'));
  const row = document.getElementById('row-'+safeId(fullPath));
  if (row) row.classList.add('active');
  currentPreviewPath=fullPath; currentPreviewName=name; currentPreviewUrl=null;

  const panel = document.getElementById('previewPanel');
  panel.classList.add('visible');
  document.getElementById('previewName').textContent=name;
  document.getElementById('previewContent').innerHTML=
    '<div class="preview-empty"><div class="pi">⏳</div><p>Loading preview…</p></div>';

  try {
    const res  = await fetch(API+'/filesGetDownloadUrl?path='+encodeURIComponent(fullPath)+'&inline=true', { credentials:'include' });
    const data = await res.json();
    if (!data.url) throw new Error('No URL');
    currentPreviewUrl = data.url;

    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(name);
    if (isImage) {
      // Image: use img tag so it sizes to natural dimensions
      var img = document.createElement('img');
      img.style.cssText = 'max-width:100%;height:auto;display:block';
      img.src = data.url;
      img.alt = name;
      document.getElementById('previewContent').innerHTML = '';
      document.getElementById('previewContent').appendChild(img);
    } else {
      // PDF: use iframe, fills panel height
      document.getElementById('previewContent').innerHTML =
        '<iframe src="'+data.url+'" title="'+esc(name)+'" style="width:100%;height:calc(100vh - 180px);min-height:400px;border:none;display:block"></iframe>';
    }
  } catch(e) {
    document.getElementById('previewContent').innerHTML=
      '<div class="preview-empty" style="color:var(--rd)"><div class="pi">⚠️</div><p>Could not load preview</p></div>';
  }
}

function openFullWindow() { if (currentPreviewUrl) window.open(currentPreviewUrl,'_blank'); }
function downloadCurrent() { if (currentPreviewPath&&currentPreviewName) downloadFile(currentPreviewPath,currentPreviewName); }
function closePreview() {
  document.getElementById('previewPanel').classList.remove('visible');
  document.querySelectorAll('.file-table tbody tr').forEach(r=>r.classList.remove('active'));
  currentPreviewPath=null; currentPreviewName=null; currentPreviewUrl=null;
}

async function downloadFile(fullPath, name) {
  try {
    showToast('Preparing download…');
    const res  = await fetch(API+'/filesGetDownloadUrl?path='+encodeURIComponent(fullPath), { credentials:'include' });
    const data = await res.json();
    if (!data.url) throw new Error('No URL');
    const a=document.createElement('a'); a.href=data.url; a.download=name; a.target='_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast('Download started!');
  } catch(e) { showToast('Download failed: '+e.message, true); }
}

async function deleteFile(fullPath, name) {
  if (!confirm('Delete "'+name+'"?\n\nThis cannot be undone.')) return;
  try {
    const res = await fetch(API+'/filesDeleteFile?path='+encodeURIComponent(fullPath), { method:'DELETE', credentials:'include' });
    if (!res.ok) throw new Error('Delete failed');
    showToast('File deleted');
    if (currentPreviewPath===fullPath) closePreview();
    loadFiles();
  } catch(e) { showToast('Delete failed: '+e.message, true); }
}

async function handleFiles(fileList) {
  if (!fileList||!fileList.length) return;
  const prog = document.getElementById('uploadProgress');
  prog.style.display='inline';
  for (let i=0; i<fileList.length; i++) {
    const file = fileList[i];
    if (!file.name.toLowerCase().endsWith('.pdf')) { showToast('Skipped '+file.name,true); continue; }
    prog.textContent='Uploading '+(i+1)+'/'+fileList.length+': '+file.name+'…';
    try {
      const b64 = await fileToBase64(file);
      const res = await fetch(API+'/filesUploadFile', {
        method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
        body: JSON.stringify({ filename:file.name, fileBase64:b64, contentType:'application/pdf', year:currentYear, month:currentMonth })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error||'Upload failed');
      showToast('✓ Uploaded: '+file.name);
    } catch(e) { showToast('Failed: '+file.name+' — '+e.message, true); }
  }
  prog.style.display='none';
  document.getElementById('fileInput').value='';
  loadFiles();
}

function fileToBase64(f) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(f); });
}

async function logout() {
  await fetch(API+'/authLogout',{method:'POST',credentials:'include'});
  sessionStorage.clear(); window.location.href='/';
}

function showToast(msg, isErr) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(isErr?' err':'');
  setTimeout(()=>t.className='toast',3000);
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+
    ' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}

function safeId(s){ return String(s||'').replace(/[^a-z0-9]/gi,'_'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
