<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Texan Local — Clients</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--bg:#dde0e6;--md:#4a4f5e;--br:#c8cdd8;--green:#1a5c1a}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

.hdr{background:var(--bl);border-bottom:4px solid var(--rd);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-l h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff}
.hdr-r{display:flex;gap:10px}
.btn-hdr{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 14px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.btn-hdr:hover{background:rgba(255,255,255,.2)}

.main{max-width:1100px;margin:0 auto;padding:1.5rem;flex:1;width:100%}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--br);border-radius:5px;font-size:13px;font-family:inherit;outline:none;background:#fff}
.search-box input:focus{border-color:var(--rd)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--md);font-size:14px}
.client-count{font-size:12px;color:var(--md)}

.btn{padding:8px 16px;border-radius:5px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--bl);color:#fff}
.btn-primary:hover{background:#001844}
.btn-import{background:#f0f4ff;color:var(--bl);border:1px solid #c0ccff}
.btn-import:hover{background:#dde5ff}

/* Upload zone */
.import-zone{border:2px dashed var(--br);border-radius:8px;padding:1.5rem;text-align:center;background:#fff;cursor:pointer;transition:all .2s;position:relative;display:none;margin-bottom:1.2rem}
.import-zone.visible{display:block}
.import-zone:hover,.import-zone.drag-over{border-color:var(--rd);background:#fff8f8}
.import-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.import-zone p{font-size:13px;color:var(--md);margin-bottom:6px}
.import-zone small{font-size:11px;color:#aaa}
.import-options{display:flex;gap:10px;justify-content:center;margin-top:10px}
.btn-sm{padding:5px 12px;border-radius:4px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-merge{background:#e8f5e9;color:var(--green);border:1px solid #a5d6a7}
.btn-replace{background:#ffebee;color:var(--rd);border:1px solid #ffcdd2}

/* Client table */
.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden}
.client-table{width:100%;border-collapse:collapse;font-size:13px}
.client-table thead{background:var(--bl)}
.client-table th{color:#fff;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.client-table td{padding:11px 14px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
.client-table tr:last-child td{border-bottom:none}
.client-table tr:hover td{background:#f9fafc}
.td-biz{font-weight:700;color:var(--bl)}
.td-email{color:var(--md);font-size:12px}
.td-actions{text-align:right;white-space:nowrap}
.btn-edit{background:#f0f4ff;color:var(--bl);border:1px solid #c0ccff}
.btn-edit:hover{background:#dde5ff}
.btn-del{background:#fff0f0;color:var(--rd);border:1px solid #ffcdd2;margin-left:4px}
.btn-del:hover{background:#ffebee}

.empty-state{padding:4rem;text-align:center;color:var(--md)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;color:var(--bl);margin-bottom:6px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:10px;padding:1.8rem;width:90%;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:700;color:var(--bl);margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:2px solid var(--rd)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:700;color:var(--md);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.field input,.field textarea{width:100%;border:none;border-bottom:2px solid var(--br);background:transparent;font-size:14px;font-family:inherit;padding:6px 2px;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-bottom-color:var(--rd)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--br)}
.btn-cancel{background:#f0f2f5;color:var(--md);padding:8px 16px;border-radius:4px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save{background:var(--bl);color:#fff;padding:8px 20px;border-radius:4px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.err{background:var(--rd)}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <img src="/assets/logo.png" alt="" style="height:44px" onerror="this.style.display='none'">
    <h1>Client List</h1>
  </div>
  <div class="hdr-r">
    <a href="/home" class="btn-hdr">← Portal Home</a>
    <button class="btn-hdr" onclick="logout()">Sign Out</button>
  </div>
</header>

<div class="main">

  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search clients…" oninput="renderTable()">
    </div>
    <span class="client-count" id="clientCount"></span>
    <button class="btn btn-import" onclick="toggleImport()">📥 Import CSV</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add Client</button>
  </div>

  <!-- Import zone -->
  <div class="import-zone" id="importZone">
    <input type="file" id="csvFile" accept=".csv,.xlsx,.xls" onchange="handleImportFile(this.files[0])">
    <p>📊 Drop your client CSV or Excel file here</p>
    <small>Columns: Business Name, Contact Name, Email, Phone (optional)</small>
    <div class="import-options" id="importOptions" style="display:none">
      <button class="btn-sm btn-merge" onclick="doImport('merge')">Merge with existing</button>
      <button class="btn-sm btn-replace" onclick="doImport('replace')">Replace all clients</button>
      <button class="btn-sm" onclick="cancelImport()" style="background:#f0f2f5;color:var(--md)">Cancel</button>
    </div>
  </div>

  <!-- Client table -->
  <div class="card">
    <div id="tableContainer">
      <div class="empty-state"><div class="ei">⏳</div><h3>Loading…</h3></div>
    </div>
  </div>

</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add Client</h3>
    <div class="field"><label>Business Name *</label><input type="text" id="fBusiness" placeholder="ChemDry"></div>
    <div class="field-row">
      <div class="field"><label>Contact Name</label><input type="text" id="fContact" placeholder="John Smith"></div>
      <div class="field"><label>Phone</label><input type="text" id="fPhone" placeholder="830-555-0100"></div>
    </div>
    <div class="field"><label>Email *</label><input type="email" id="fEmail" placeholder="john@chemdry.com"></div>
    <div class="field"><label>Notes</label><textarea id="fNotes" placeholder="Optional notes…"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script>
const API = '/api';
let allClients   = [];
let editingId    = null;
let importBuffer = null;

async function init() {
  const token = sessionStorage.getItem('txl_token');
  const res   = await fetch(API + '/authVerify' + (token ? '?token=' + token : ''), { credentials: 'include' });
  if (!res.ok) { window.location.href = '/'; return; }
  const user = await res.json();
  if (user.role === 'designer') { window.location.href = '/upload'; return; }
  loadClients();
}

async function loadClients() {
  try {
    const res  = await fetch(API + '/getClients', { credentials: 'include' });
    const data = await res.json();
    allClients = data.clients || [];
    renderTable();
  } catch(e) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><div class="ei">⚠️</div><h3>Failed to load clients</h3></div>';
  }
}

function renderTable() {
  const q        = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? allClients.filter(c =>
    c.business.toLowerCase().includes(q) ||
    (c.contact || '').toLowerCase().includes(q) ||
    (c.email || '').toLowerCase().includes(q)
  ) : allClients;

  document.getElementById('clientCount').textContent = filtered.length + ' of ' + allClients.length + ' clients';

  if (!allClients.length) {
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty-state">
        <div class="ei">👥</div>
        <h3>No clients yet</h3>
        <p>Import a CSV or click <strong>+ Add Client</strong> to get started</p>
      </div>`;
    return;
  }

  if (!filtered.length) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><div class="ei">🔍</div><h3>No clients match your search</h3></div>';
    return;
  }

  document.getElementById('tableContainer').innerHTML = `
    <table class="client-table">
      <thead><tr>
        <th>Business Name</th><th>Contact</th><th>Email</th><th>Phone</th><th>Notes</th><th style="text-align:right">Actions</th>
      </tr></thead>
      <tbody>${filtered.map(c => `
        <tr>
          <td class="td-biz">${esc(c.business)}</td>
          <td>${esc(c.contact || '—')}</td>
          <td class="td-email">${esc(c.email || '—')}</td>
          <td style="font-size:12px;color:var(--md)">${esc(c.phone || '—')}</td>
          <td style="font-size:12px;color:var(--md);max-width:150px">${esc(c.notes || '—')}</td>
          <td class="td-actions">
            <button class="btn-sm btn-edit" onclick="openModal('${c.id}')">✏ Edit</button>
            <button class="btn-sm btn-del" onclick="deleteClient('${c.id}','${esc(c.business)}')">🗑</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  const client = id ? allClients.find(c => c.id === id) : null;
  document.getElementById('modalTitle').textContent = client ? 'Edit Client' : 'Add Client';
  document.getElementById('fBusiness').value = client ? client.business : '';
  document.getElementById('fContact').value  = client ? (client.contact || '') : '';
  document.getElementById('fPhone').value    = client ? (client.phone || '') : '';
  document.getElementById('fEmail').value    = client ? (client.email || '') : '';
  document.getElementById('fNotes').value    = client ? (client.notes || '') : '';
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('fBusiness').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editingId = null;
}

async function saveClient() {
  const business = document.getElementById('fBusiness').value.trim();
  const email    = document.getElementById('fEmail').value.trim();
  if (!business) { showToast('Business name is required', true); return; }

  const client = {
    business,
    contact: document.getElementById('fContact').value.trim(),
    phone:   document.getElementById('fPhone').value.trim(),
    email,
    notes:   document.getElementById('fNotes').value.trim()
  };
  if (editingId) client.id = editingId;

  try {
    const res = await fetch(API + '/saveClient', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
      body: JSON.stringify({ client })
    });
    if (!res.ok) throw new Error('Save failed');
    closeModal();
    showToast(editingId ? 'Client updated!' : 'Client added!');
    loadClients();
  } catch(e) {
    showToast('Error: ' + e.message, true);
  }
}

async function deleteClient(id, name) {
  if (!confirm(`Delete "${name}"?\n\nThis cannot be undone.`)) return;
  try {
    const res = await fetch(API + '/deleteClient', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
      body: JSON.stringify({ id })
    });
    if (!res.ok) throw new Error('Delete failed');
    showToast('Client deleted');
    loadClients();
  } catch(e) {
    showToast('Error: ' + e.message, true);
  }
}

// ── Import ────────────────────────────────────────────────────────────────────
function toggleImport() {
  const zone = document.getElementById('importZone');
  zone.classList.toggle('visible');
}

function handleImportFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb   = XLSX.read(e.target.result, { type: 'binary' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!rows.length) { showToast('No data found', true); return; }

    const keys       = Object.keys(rows[0]).map(k => k.toLowerCase().trim());
    const bizKey     = Object.keys(rows[0])[keys.findIndex(k => k.includes('biz') || k.includes('business') || k.includes('company') || k === 'name')];
    const contactKey = Object.keys(rows[0])[keys.findIndex(k => k.includes('contact') || k.includes('first') || k.includes('person'))];
    const emailKey   = Object.keys(rows[0])[keys.findIndex(k => k.includes('email') || k.includes('mail'))];
    const phoneKey   = Object.keys(rows[0])[keys.findIndex(k => k.includes('phone') || k.includes('cell') || k.includes('mobile'))];

    if (!bizKey) { showToast('Could not find Business Name column', true); return; }

    importBuffer = rows.map(r => ({
      business: String(r[bizKey] || '').trim(),
      contact:  contactKey ? String(r[contactKey] || '').trim() : '',
      email:    emailKey   ? String(r[emailKey]   || '').trim() : '',
      phone:    phoneKey   ? String(r[phoneKey]   || '').trim() : ''
    })).filter(c => c.business);

    showToast(`Found ${importBuffer.length} clients — choose import mode`);
    document.getElementById('importOptions').style.display = 'flex';
  };
  reader.readAsBinaryString(file);
}

async function doImport(mode) {
  if (!importBuffer) return;
  try {
    const res  = await fetch(API + '/importClients', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
      body: JSON.stringify({ clients: importBuffer, mode })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    showToast(`✓ ${data.added} added, ${data.updated} updated — ${data.total} total clients`);
    cancelImport();
    loadClients();
  } catch(e) {
    showToast('Import failed: ' + e.message, true);
  }
}

function cancelImport() {
  importBuffer = null;
  document.getElementById('importOptions').style.display = 'none';
  document.getElementById('csvFile').value = '';
  document.getElementById('importZone').classList.remove('visible');
}

async function logout() {
  await fetch(API + '/authLogout', { method: 'POST', credentials: 'include' });
  sessionStorage.clear(); window.location.href = '/';
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 3500);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

init();
</script>
</body>
</html>
