<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Texan Local — Magazine Layout</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--bg:#c8cdd8;--md:#4a4f5e;--br:#c8cdd8;--green:#1a5c1a;--amber:#e65100}
body{font-family:'Source Sans 3',sans-serif;background:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hdr{background:var(--bl);border-bottom:4px solid var(--rd);padding:.6rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.hdr-l{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{height:36px}
.hdr-l h1{font-family:'Playfair Display',serif;font-size:14px;color:#fff;white-space:nowrap}
.hdr-mid{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;flex-wrap:wrap}
.hdr-mid label{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px}
.hdr-mid select{padding:4px 8px;border:1px solid rgba(255,255,255,.25);border-radius:4px;font-size:12px;font-family:inherit;background:rgba(255,255,255,.1);color:#fff;outline:none;cursor:pointer}
.hdr-mid select option{background:#00205B;color:#fff}
.btn-load{background:var(--rd);color:#fff;border:none;padding:5px 14px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-hdr{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block;white-space:nowrap}
.btn-hdr:hover{background:rgba(255,255,255,.2)}

/* Zoom controls */
.zoom-bar{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border-radius:4px;padding:3px 8px}
.zoom-bar label{font-size:10px;color:rgba(255,255,255,.6)}
.zoom-bar input[type=range]{width:80px;accent-color:var(--rd)}
.zoom-bar span{font-size:11px;color:#fff;min-width:32px;text-align:center}

/* Zone tabs */
.zone-bar{background:#111827;border-bottom:1px solid #2a3550;padding:0;display:flex;overflow-x:auto;flex-shrink:0}
.zone-tab{padding:.45rem 1rem;font-size:11px;font-weight:700;color:rgba(255,255,255,.4);cursor:pointer;border:none;background:transparent;font-family:inherit;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:5px}
.zone-tab:hover{color:rgba(255,255,255,.75)}
.zone-tab.active{color:#fff;border-bottom-color:var(--rd);background:rgba(255,255,255,.05)}
.zone-tab .z-cnt{font-size:9px;background:rgba(255,255,255,.15);border-radius:8px;padding:1px 5px}
.zone-tab.active .z-cnt{background:var(--rd)}

/* Workspace */
.workspace{display:flex;flex:1;min-height:0;height:calc(100vh - 110px);overflow:hidden;position:relative}

/* Spread area */
.spread-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:1rem;background:#1a1a2e;flex-direction:column;gap:.5rem;min-height:0;height:100%;display:block}
.zone-toolbar{display:flex;align-items:center;justify-content:space-between;padding:.5rem .8rem;background:#111827;border-radius:6px;margin-bottom:.5rem;flex-shrink:0}
.zone-toolbar h2{font-size:12px;font-weight:700;color:#fff}
.zone-toolbar .pg-info{font-size:11px;color:rgba(255,255,255,.5)}
.btn-pg{background:#2a3550;border:1px solid #3a4a70;color:#fff;padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-pg:hover{background:#3a4a70}
.btn-email-designer{background:var(--rd);color:#fff;border:none;padding:4px 12px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* Spreads grid - 2 per row */
.spreads-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}

/* Each spread */
.spread-wrap{display:flex;flex-direction:column;gap:3px}
.spread-label{font-size:9px;color:rgba(255,255,255,.4);text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.spread{display:flex;gap:3px;background:transparent;border-radius:3px;padding:2px;cursor:default}

/* Page - 11" x 6.5" ratio = 11/6.5 = 1.692 width per height */
/* We want each page in the grid to be correct ratio */
/* Each spread takes full column width. Page = half the spread width */
/* Height = width * (6.5/11) */
.page-side{
  flex:1;
  position:relative;
  background:#fff;
  border-radius:1px;
  overflow:hidden;
  /* Aspect ratio 11:6.5 = 1.692:1 */
  aspect-ratio: 11 / 6.5;
  display:flex;
  flex-direction:column;
  transition:outline .1s;
  min-height:0;
}
.page-side.drag-over{outline:2px solid var(--rd);background:rgba(191,13,62,.05)}
.page-side.two-page{flex:2}

/* Empty page */
.page-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;color:#ccc;font-size:11px;border:2px dashed #ddd}
.page-empty .drop-hint{font-size:9px;color:#aaa;text-align:center}

/* FP slot */
.slot-fp{width:100%;height:100%;position:relative;cursor:pointer;display:flex;align-items:flex-end}
.slot-fp:active{cursor:pointer}
.slot-fp img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.slot-fp .ad-label{position:relative;z-index:2;width:100%;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:700;padding:3px 5px;text-align:center;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;backdrop-filter:blur(2px)}
.slot-fp .no-thumb{position:absolute;inset:0;background:#e8edf8;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px}
.slot-fp .no-thumb span{font-size:10px;color:#888}
.slot-fp .size-pip{position:absolute;top:3px;right:3px;background:var(--rd);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;z-index:3}
.btn-rm{position:absolute;top:2px;left:2px;background:rgba(191,13,62,.9);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;line-height:1}
.slot-fp:hover .btn-rm{display:flex}

/* HP slots - side by side */
.hp-pair{display:flex;width:100%;height:100%;gap:1px}
.slot-hp{flex:1;height:100%;position:relative;cursor:pointer;display:flex;align-items:flex-end;overflow:hidden;border:2px dashed transparent}
.slot-hp:active{cursor:pointer}
.slot-hp.empty{border-color:#ddd;align-items:center;justify-content:center;flex-direction:column;gap:2px;background:#fafafa}
.slot-hp.drag-over{border-color:var(--rd);background:rgba(191,13,62,.05)}
.slot-hp img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.slot-hp .ad-label{position:relative;z-index:2;width:100%;background:rgba(0,0,0,.55);color:#fff;font-size:8px;font-weight:700;padding:2px 4px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-hp .no-thumb{position:absolute;inset:0;background:#e8edf8;display:flex;align-items:center;justify-content:center;flex-direction:column}
.slot-hp .size-pip{position:absolute;top:2px;right:2px;background:var(--amber);color:#fff;font-size:7px;font-weight:700;padding:1px 3px;border-radius:2px;z-index:3}
.slot-hp .btn-rm{width:14px;height:14px;font-size:8px}
.slot-hp:not(.empty):hover .btn-rm{display:flex}

/* 2P spread - double width page, same height */
.spread-2p-wrap{flex:1;position:relative;overflow:hidden;aspect-ratio:22/6.5;background:#fff;border-radius:1px;cursor:pointer;display:flex;align-items:flex-end}
.spread-2p-wrap:active{cursor:pointer}
.spread-2p-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.spread-2p-wrap .ad-label{position:relative;z-index:2;width:100%;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:700;padding:3px 5px;text-align:center}
.spread-2p-wrap .size-pip{position:absolute;top:3px;right:3px;background:var(--green);color:#fff;font-size:8px;padding:1px 4px;border-radius:2px;z-index:3;font-weight:700}
.spread-2p-gutter{position:absolute;top:0;bottom:0;left:50%;width:3px;background:#1a1a2e;transform:translateX(-50%);z-index:4}
.btn-rm-2p{position:absolute;top:4px;left:4px;background:rgba(191,13,62,.9);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;transition:opacity .15s}
.spread-2p-wrap:hover .btn-rm-2p{opacity:1}

/* Artwork panel */
.art-panel{width:260px;background:#111827;border-left:1px solid #2a3550;display:flex;flex-direction:column;flex-shrink:0;height:100%;min-height:0;overflow:hidden;position:relative}
.art-panel-hdr{background:#0a0f1e;padding:.6rem .8rem;flex-shrink:0;overflow:hidden}
.art-panel-hdr h3{color:#fff;font-size:11px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.art-panel-filters{display:flex;flex-direction:column;gap:5px}
.art-panel-filters select,.art-panel-filters input{width:100%;padding:4px 7px;border:1px solid #2a3550;border-radius:3px;font-size:11px;font-family:inherit;background:#1a2540;color:#fff;outline:none}
.art-panel-filters select option{background:#1a2540}
.art-list{flex:1;overflow-y:auto;padding:.5rem;min-height:0}

/* Art card */
.art-card{background:#1e2a42;border:1px solid #2a3550;border-radius:4px;margin-bottom:5px;cursor:pointer;transition:all .15s;overflow:hidden}
.art-card:active{cursor:pointer;opacity:.7}
.art-card:hover{border-color:#4a6090;background:#253354}
.art-card.selected{border-color:#BF0D3E!important;background:#2a1520!important;box-shadow:0 0 0 2px rgba(191,13,62,.4)}
.art-card.placed{opacity:.3;border-style:dashed}
.art-card .thumb-wrap{position:relative;background:#0d1525;overflow:hidden}
.art-card.fp-card .thumb-wrap{aspect-ratio:11/6.5}
.art-card.hp-card .thumb-wrap{aspect-ratio:5.5/6.5}
.art-card.two-p-card .thumb-wrap{aspect-ratio:22/6.5}
.art-card .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.art-card .thumb-na{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px}
.art-card .thumb-na .na-label{font-size:16px;color:#3a4a70;font-weight:700}
.art-card .thumb-na .na-sub{font-size:9px;color:#3a4a70}
.art-card .thumb-loading{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#3a4a70;font-size:10px}
.art-card .card-info{padding:4px 6px;display:flex;align-items:center;justify-content:space-between}
.art-card .card-biz{font-size:10px;font-weight:700;color:#c8d8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.art-card .card-meta{display:flex;gap:3px;flex-shrink:0}
.size-tag{font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;color:#fff}
.size-tag.fp{background:var(--rd)}
.size-tag.hp{background:var(--amber)}
.size-tag.two-p{background:var(--green)}
.zones-tag{font-size:8px;color:#6a8ab8;margin-top:1px}
.btn-gen-thumb{position:absolute;bottom:3px;right:3px;background:rgba(0,32,91,.85);color:#fff;border:none;border-radius:2px;font-size:8px;padding:2px 5px;cursor:pointer;font-family:inherit}

.art-panel-empty{padding:1.5rem;text-align:center;color:#3a4a70;font-size:11px}

/* Loading state */
.loading-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:20;border-radius:4px}
.loading-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:16px;right:16px;background:#1a1a2e;color:#fff;padding:8px 16px;border-radius:5px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;border:1px solid #2a3550}
.toast.show{opacity:1}
.toast.err{background:var(--rd);border-color:var(--rd)}
.toast.ok{background:var(--green);border-color:var(--green)}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hdr-l">
    <img class="hdr-logo" src="/assets/logo.png" alt="TL" onerror="this.style.display='none'">
    <h1>Magazine Layout</h1>
  </div>
  <div class="hdr-mid">
    <label>Month</label>
    <select id="selMonth">
      <option value="01">January</option><option value="02">February</option>
      <option value="03">March</option><option value="04">April</option>
      <option value="05">May</option><option value="06">June</option>
      <option value="07">July</option><option value="08">August</option>
      <option value="09">September</option><option value="10">October</option>
      <option value="11">November</option><option value="12">December</option>
    </select>
    <select id="selYear"></select>
    <button class="btn-load" onclick="loadLayout()">Load</button>
    <div class="zoom-bar">
      <label>Zoom</label>
      <input type="range" id="zoomRange" min="40" max="150" value="100" oninput="applyZoom(this.value)">
      <span id="zoomLabel">100%</span>
    </div>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn-hdr" onclick="saveLayout()" style="background:rgba(255,255,255,.15)">💾 Save</button>
    <a href="/home" class="btn-hdr">← Home</a>
    <button class="btn-hdr" onclick="logout()">Sign Out</button>
  </div>
</header>

<!-- Zone tabs -->
<div class="zone-bar" id="zoneTabs"></div>

<!-- Workspace -->
<div class="workspace">
  <div class="spread-area" id="spreadArea">
    <div style="padding:3rem;text-align:center;color:#3a4a70;font-size:14px">
      <div style="font-size:32px;margin-bottom:12px">📰</div>
      Select a mailing month and click <strong style="color:#fff">Load</strong> to begin
    </div>
  </div>
  <div class="art-panel">
    <div class="art-panel-hdr">
      <h3>Available Artwork</h3>
      <div class="art-panel-filters">
        <select id="zoneFilter" onchange="filterArtwork()">
          <option value="">All Zones</option>
        </select>
        <input type="text" id="artSearch" placeholder="Search business…" oninput="filterArtwork()">
        <button onclick="genAllThumbs()" style="background:#2a3550;color:#fff;border:1px solid #3a4a70;border-radius:3px;padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:2px">⚡ Generate All Thumbs</button>
      </div>
    </div>
    <div class="art-list" id="artList">
      <div class="art-panel-empty">Load a month to see artwork</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let zones       = [];
let allArtwork  = [];   // all parsed artwork for the month
let layouts     = {};   // { zoneId: { pages, spreads:[{left,right},...] } }
let activeZone  = null;
let curMonth    = null;
let curYear     = null;
let settings    = {};
let dragItem    = null;
let zoomScale   = 1.0;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const token = sessionStorage.getItem('txl_token');
  const res   = await fetch(API+'/authVerify'+(token?'?token='+token:''),{credentials:'include'});
  if (!res.ok) { window.location.href='/'; return; }

  const now  = new Date();
  const ysel = document.getElementById('selYear');
  for (let y=now.getFullYear();y<=now.getFullYear()+1;y++) {
    const o=document.createElement('option');o.value=y;o.textContent=y;ysel.appendChild(o);
  }
  const next = new Date(now.getFullYear(),now.getMonth()+1,1);
  document.getElementById('selMonth').value = String(next.getMonth()+1).padStart(2,'0');
  ysel.value = next.getFullYear();

  try {
    const sr = await fetch(API+'/getCompanySettings',{credentials:'include'});
    const sd = await sr.json();
    settings = sd.settings || {};
    zones    = (settings.zones||[]).filter(function(z){return z.active;});
  } catch(e){}

  if (!zones.length) zones = [
    {id:'01-NBE',name:'New Braunfels East',pages:16,active:true},
    {id:'02-NBW',name:'New Braunfels West',pages:16,active:true},
    {id:'03-BSB',name:'Bulverde/Spring Branch',pages:16,active:true},
    {id:'04-SMW',name:'Schertz/Marion/Welder',pages:16,active:true},
    {id:'05-SCG',name:'Seguin',pages:16,active:true},
    {id:'06-TPC',name:'The Park/Converse',pages:16,active:true},
    {id:'07-STP',name:'Stone Oak/TPC',pages:16,active:true}
  ];

  buildZoneTabs();
  populateZoneFilter();
}

function buildZoneTabs() {
  document.getElementById('zoneTabs').innerHTML = zones.map(function(z){
    return '<button class="zone-tab" id="ztab-'+z.id+'" onclick="selectZone(\''+z.id+'\')">'+
      z.id+'<span class="z-cnt" id="zcnt-'+z.id+'">0</span></button>';
  }).join('');
}

function populateZoneFilter() {
  const s = document.getElementById('zoneFilter');
  s.innerHTML = '<option value="">All Zones</option>';
  zones.forEach(function(z){
    const o=document.createElement('option');o.value=z.id;o.textContent=z.id+' — '+z.name;s.appendChild(o);
  });
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadLayout() {
  curMonth = document.getElementById('selMonth').value;
  curYear  = document.getElementById('selYear').value;
  showToast('Loading artwork…');

  try {
    // Load artwork files
    const ar   = await fetch(API+'/getLayoutArtwork?month='+curMonth+'&year='+curYear,{credentials:'include',cache:'no-store'});
    const ad   = await ar.json();
    allArtwork = ad.files || [];

    // Load saved layout
    try {
      const lr = await fetch(API+'/getLayoutData?month='+curMonth+'&year='+curYear,{credentials:'include'});
      const ld = await lr.json();
      layouts  = ld.layout || {};
    } catch(e){ layouts={}; }

    // Init zone layouts
    zones.forEach(function(z){
      if (!layouts[z.id]) initZoneLayout(z);
    });

    // Update zone art counts
    updateZoneCounts();
    renderArtPanel();

    if (activeZone) renderSpreads();
    else if (zones.length) selectZone(zones[0].id);

    showToast('Loaded '+allArtwork.length+' files', false);
  } catch(e){ showToast('Error: '+e.message, true); }
}

function initZoneLayout(zone) {
  const pages = zone.pages || 16;
  // Structure: FC slot + interior spreads + BP slot
  // Interior spreads = (pages - 2) / 2
  // Total slots = 1 (FC) + interior + 1 (BP) = (pages/2) + 1
  const interiorSpreads = (pages - 2) / 2;
  const spreads = [];
  spreads.push({left:null, right:null}); // FC slot (only .left used)
  for (let i=0;i<interiorSpreads;i++) spreads.push({left:null,right:null});
  spreads.push({left:null, right:null}); // BP slot (only .right used)
  layouts[zone.id] = { pages, spreads };
}

// ── Zone management ───────────────────────────────────────────────────────────
function selectZone(zId) {
  activeZone = zId;
  document.querySelectorAll('.zone-tab').forEach(function(t){t.classList.remove('active');});
  const tab = document.getElementById('ztab-'+zId);
  if (tab) tab.classList.add('active');
  document.getElementById('zoneFilter').value = zId;
  filterArtwork();
  renderSpreads();
}

function updateZoneCounts() {
  zones.forEach(function(z){
    const cnt = artworkForZone(z.id).length;
    const el  = document.getElementById('zcnt-'+z.id);
    if (el) el.textContent = cnt;
  });
}

// ── Artwork helpers ───────────────────────────────────────────────────────────
function zoneNum(zId) { return parseInt(zId.split('-')[0]); }

function artworkForZone(zId) {
  const num = zoneNum(zId);
  return allArtwork.filter(function(a){
    if (!a.zones || !a.zones.length) return true;
    return a.zones.indexOf(num) !== -1;
  });
}

function getPlacedIds() {
  const placed = {};
  Object.keys(layouts).forEach(function(zid){
    const layout = layouts[zid];
    if (!layout) return;
    layout.spreads.forEach(function(sp){
      ['left','right'].forEach(function(side){
        const s = sp[side];
        if (!s) return;
        if (s.type==='hp-pair') {
          if (s.left)  placed[s.left.id]  = true;
          if (s.right) placed[s.right.id] = true;
        } else if (s.id) placed[s.id] = true;
      });
    });
  });
  return placed;
}

// ── Artwork Panel ─────────────────────────────────────────────────────────────
function filterArtwork() { renderArtPanel(); }

function renderArtPanel() {
  const zf       = document.getElementById('zoneFilter').value;
  const q        = (document.getElementById('artSearch').value||'').toLowerCase();
  const placedIds= getPlacedIds();
  const list     = document.getElementById('artList');

  let filtered = zf ? artworkForZone(zf) : allArtwork;
  if (q) filtered = filtered.filter(function(a){return a.business.toLowerCase().includes(q);});

  // Filter out placed items
  const unplaced = filtered.filter(function(a){ return !placedIds[a.id]; });

  if (!filtered.length) {
    list.innerHTML='<div class="art-panel-empty">'+(allArtwork.length?'No artwork for this filter':'Load a month to see artwork')+'</div>';
    return;
  }
  if (!unplaced.length && filtered.length) {
    list.innerHTML='<div class="art-panel-empty" style="color:var(--green)">✓ All artwork placed!</div>';
    return;
  }

  list.innerHTML = unplaced.map(function(a){
    const sc     = a.size==='FP'||a.size==='FC'||a.size==='BP'?'fp':a.size==='HP'?'hp':'two-p';
    const cc     = a.size==='FP'||a.size==='FC'||a.size==='BP'?'fp-card':a.size==='HP'?'hp-card':'two-p-card';
    const szLbl  = a.size==='2P'?'2P Spread':a.size==='FC'?'FC Cover':a.size==='BP'?'BP Back':a.size;
    const thumbHtml = a.thumbUrl
      ? '<img src="'+a.thumbUrl+'" alt="'+esc(a.business)+'" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="thumb-na" style="display:none"><div class="na-label">N/A</div><div class="na-sub">No preview</div></div>'
      : '<div class="thumb-na"><div class="na-label">N/A</div><div class="na-sub">No preview</div></div>' +
        '<button class="btn-gen-thumb" onclick="event.stopPropagation();genThumb(\''+esc(a.id)+'\',\''+esc(a.path)+'\',this)">Generate</button>';

    return '<div class="art-card '+cc+'" draggable="true" id="artcard-'+esc(a.id)+'" '+
      'ondragstart="onArtDrag(event,\''+esc(a.id)+'\')" ondragend="onArtDragEnd(event)">'+
      '<div class="thumb-wrap">'+thumbHtml+'</div>'+
      '<div class="card-info">'+
        '<div class="card-biz">'+esc(a.business)+'</div>'+
        '<div class="card-meta"><span class="size-tag '+sc+'">'+szLbl+'</span></div>'+
      '</div>'+
      (a.zoneStr?'<div class="zones-tag" style="padding:0 6px 3px">'+esc(a.zoneStr)+'</div>':'')+
    '</div>';
  }).join('');
}

async function genThumb(artId, pdfPath, btn) {
  const card = btn ? btn.closest('.art-card') : document.getElementById('artcard-'+artId.replace(/[^a-zA-Z0-9]/g,''));
  const wrap = card ? card.querySelector('.thumb-wrap') : null;
  if (wrap) wrap.innerHTML = '<div class="thumb-loading">⏳ Generating…</div>';
  if (btn) btn.style.display = 'none';
  try {
    const res  = await fetch(API+'/generateThumb', {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({ pdfPath: pdfPath })
    });
    const data = await res.json();
    if (data.url) {
      const art = allArtwork.find(function(a){ return a.id===artId; });
      if (art) { art.thumbUrl=data.url; art.hasThumb=true; }
      showToast('Thumbnail ready!', false);
      renderArtPanel();
      if (activeZone) renderSpreads();
    } else {
      if (wrap) wrap.innerHTML = '<div class="thumb-na"><div class="na-label">N/A</div><div class="na-sub">'+(data.error||'Failed')+'</div></div>';
      showToast('Failed: '+(data.error||'error'), true);
    }
  } catch(e) {
    if (wrap) wrap.innerHTML = '<div class="thumb-na"><div class="na-label">N/A</div></div>';
    showToast('Error: '+e.message, true);
  }
}

async function genAllThumbs() {
  const missing = allArtwork.filter(function(a){ return !a.hasThumb; });
  if (!missing.length) { showToast('All thumbnails already generated!', false); return; }
  showToast('Generating '+missing.length+' thumbnails — this may take a few minutes…');
  for (let i=0; i<missing.length; i++) {
    await genThumb(missing[i].id, missing[i].path, null);
    await new Promise(function(r){ setTimeout(r, 1000); });
  }
  showToast('All thumbnails generated!', false);
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
function applyZoom(val) {
  zoomScale = val/100;
  document.getElementById('zoomLabel').textContent = val+'%';
  const grid = document.getElementById('spreadsGrid');
  if (grid) grid.style.zoom = zoomScale;
}

// ── Render Spreads ────────────────────────────────────────────────────────────
function renderSpreads() {
  if (!activeZone) return;
  const layout = layouts[activeZone];
  const zone   = zones.find(function(z){return z.id===activeZone;});
  if (!layout) return;

  let html = '<div class="zone-toolbar">'+
    '<div>'+
      '<h2>'+esc(activeZone)+' — '+(zone?esc(zone.name):activeZone)+'</h2>'+
      '<div class="pg-info">'+layout.pages+' pages · '+(layout.spreads.length-2)+' interior spreads</div>'+
    '</div>'+
    '<div style="display:flex;gap:6px;align-items:center">'+
      '<button class="btn-pg" onclick="removePgs()">− 4 Pages</button>'+
      '<button class="btn-pg" onclick="addPgs()">+ 4 Pages</button>'+
      '<button class="btn-email-designer" onclick="emailDesigner()">✉ Email to Designer</button>'+
    '</div>'+
  '</div>';

  html += '<div class="spreads-grid" id="spreadsGrid">';

  const totalSpreads = layout.spreads.length;

  layout.spreads.forEach(function(sp, si) {
    const isFC = (si === 0);
    const isBP = (si === totalSpreads - 1);
    const is2P = !isFC && !isBP && sp.left && sp.left.size === '2P';

    if (isFC) {
      html += '<div class="spread-wrap">'+
        '<div class="spread-label">Page 1 — Front Cover</div>'+
        '<div class="spread" id="sp-'+activeZone+'-'+si+'"'+
          ' data-zone="'+activeZone+'" data-si="'+si+'" style="justify-content:flex-end">'+
          renderPageSide(sp.left, si, 'left', 'FC')+
        '</div></div>';
      return;
    }

    if (isBP) {
      const lastPageNum = (totalSpreads - 1) * 2;
      html += '<div class="spread-wrap">'+
        '<div class="spread-label">Page '+lastPageNum+' — Back Page</div>'+
        '<div class="spread" id="sp-'+activeZone+'-'+si+'"'+
          ' data-zone="'+activeZone+'" data-si="'+si+'" style="justify-content:flex-start">'+
          renderPageSide(sp.right, si, 'right', 'BP')+
        '</div></div>';
      return;
    }

    // Interior spread: pages si*2 and si*2+1
    const pageL = si * 2;
    const pageR = si * 2 + 1;

    html += '<div class="spread-wrap">'+
      '<div class="spread-label">Pages '+pageL+' – '+pageR+'</div>'+
      '<div class="spread" id="sp-'+activeZone+'-'+si+'"'+
        ' data-zone="'+activeZone+'" data-si="'+si+'"'+
        ' ondragover="spreadDragOver(event,this)" ondragleave="this.style.outline=\'\'" ondrop="spreadDrop(event,this)">';

    if (is2P) {
      html += render2PSpread(sp, si);
      html += '<div style="display:none"></div>';
    } else {
      html += renderPageSide(sp.left,  si, 'left',  'any');
      html += renderPageSide(sp.right, si, 'right', 'any');
    }

    html += '</div></div>';
  });

  html += '</div>';

  document.getElementById('spreadArea').innerHTML = html;

  // Reapply zoom
  const grid = document.getElementById('spreadsGrid');
  if (grid) grid.style.zoom = zoomScale;

  // Clear drag state on dragend for any placed element
  document.querySelectorAll('[draggable="true"]').forEach(function(el) {
    el.addEventListener('dragend', function() {
      isDragging = false;
      dragItem   = null;
    });
  });

  // Init drag events on all page sides using event delegation on spread area
  const sa = document.getElementById('spreadArea');
  if (sa && !sa._dragInited) {
    sa._dragInited = true;
    sa.addEventListener('dragover', function(e){
      if (e.target.closest('.page-side') || e.target.closest('.slot-hp') || e.target.closest('.spread')) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
      }
    });
  }
}

function renderPageSide(slot, si, side, pageType) {
  pageType = pageType || 'any';
  const da = 'ondragover="slotDragOver(event,\\'+pageType+'\')" ondrop="slotDrop(event,\\'+activeZone+'\','+si+',\\'+side+'\',\\'+pageType+'\')"';
  const hintText  = pageType==='FC' ? '🏠 Front Cover (FC/FP)' : pageType==='BP' ? '⬅ Back Page (BP/FP)' : 'Drop FP, HP, or 2P';
  const hintColor = pageType==='FC'||pageType==='BP' ? '#BF0D3E' : '#aaa';

  const isSingle = pageType === 'FC' || pageType === 'BP';
  const singleStyle = isSingle ? ' style="flex:0 0 calc(50% - 2px)"' : '';

  if (!slot) {
    return '<div class="page-side"'+singleStyle+' '+
      'onclick="placeSelected(\''+activeZone+'\','+si+',\''+side+'\',\''+pageType+'\',null)">'+
      '<div class="page-empty">'+
        '<div style="font-size:20px">'+(pageType==='FC'?'🏠':pageType==='BP'?'⬅':'📄')+'</div>'+
        '<div class="drop-hint" style="color:'+hintColor+'">'+hintText+'</div>'+
      '</div>'+
    '</div>';
  }

  if (slot.type==='hp-pair') {
    return '<div class="page-side"'+singleStyle+' '+da+'>'+
      '<div class="hp-pair">'+
        renderHpSlot(slot.left,  si, side, 'left')  +
        renderHpSlot(slot.right, si, side, 'right') +
      '</div>'+
    '</div>';
  }

  // FP/FC/BP
  const thumb = slot.thumbUrl
    ? '<img src="'+slot.thumbUrl+'" alt="'+esc(slot.business)+'" loading="lazy">'
    : '<div class="no-thumb"><span style="font-size:22px">📄</span><span>N/A</span></div>';

  return '<div class="page-side"'+singleStyle+' '+da+'>'+
    '<div class="slot-fp" '+
      'data-zone="'+esc(activeZone)+'" data-si="'+si+'" data-side="'+side+'" '+
      'onclick="event.stopPropagation();selectPlaced(\''+esc(activeZone)+'\','+si+',\''+side+'\',null)">'+
      thumb+
      '<div class="ad-label">'+esc(slot.business)+'</div>'+
      '<span class="size-pip">'+(slot.size||'FP')+'</span>'+
      '<button class="btn-rm" onclick="event.stopPropagation();removeSlot(\\'+activeZone+'\','+si+',\\'+side+'\')">✕</button>'+
    '</div>'+
  '</div>';
}

function renderHpSlot(art, si, pageSide, half) {
  const da = 'ondragover="hpDragOver(event)" ondrop="hpDrop(event,\\'+activeZone+'\','+si+',\\'+pageSide+'\',\\'+half+'\')"';
  if (!art) {
    return '<div class="slot-hp empty" '+
      'onclick="event.stopPropagation();placeSelected(\''+activeZone+'\','+si+',\''+pageSide+'\',\'any\',\''+half+'\')">'+
      '<span style="font-size:12px;color:#aaa">📄</span>'+
      '<span style="font-size:8px;color:#aaa">HP</span>'+
    '</div>';
  }
  const thumb = art.thumbUrl
    ? '<img src="'+art.thumbUrl+'" alt="'+esc(art.business)+'" loading="lazy">'
    : '<div class="no-thumb"><span style="font-size:14px">📄</span></div>';
  return '<div class="slot-hp has-ad" '+da+' draggable="true" ondragstart="placedDragStart(event,\\'+activeZone+'\','+si+',\\'+pageSide+'\',\\'+half+'\')">'+
    thumb+
    '<div class="ad-label">'+esc(art.business)+'</div>'+
    '<span class="size-pip">HP</span>'+
    '<button class="btn-rm" onclick="removeHp(\\'+activeZone+'\','+si+',\\'+pageSide+'\',\\'+half+'\')">✕</button>'+
  '</div>';
}

function render2PSpread(sp, si) {
  const art   = sp.left;
  const thumb = art.thumbUrl
    ? '<img src="'+art.thumbUrl+'" alt="'+esc(art.business)+'" loading="lazy">'
    : '<div style="position:absolute;inset:0;background:#1a2540;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px"><span style="font-size:28px">📄</span><span style="color:#3a4a70;font-size:11px">N/A</span></div>';
  return '<div class="spread-2p-wrap" '+
    'onclick="event.stopPropagation();selectPlaced(\''+esc(activeZone)+'\','+si+',\'left\',null)">'+
    thumb+
    '<div class="spread-2p-gutter"></div>'+
    '<div class="ad-label">'+esc(art.business)+'</div>'+
    '<span class="size-pip">2P</span>'+
    '<button class="btn-rm-2p" onclick="event.stopPropagation();removeSlot(\\'+activeZone+'\','+si+',\'left\')">✕</button>'+
  '</div>';
}

// ── Selection & Drag from Bank ───────────────────────────────────────────────
var SEL = null; // selected item for click-to-place
var BANK_DRAG = null; // art being dragged from bank

function artDragStart(e, artId) {
  const art = allArtwork.find(function(a){ return a.id===artId; });
  if (!art) return;
  BANK_DRAG = art;
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', artId);
}

function artDragEnd(e) {
  BANK_DRAG = null;
}

function slotDragOver(e, pageType) {
  if (!BANK_DRAG) return;
  const sz = BANK_DRAG.size;
  if (sz==='2P') return; // handled by spread
  if (pageType==='FC' && sz!=='FC') { e.dataTransfer.dropEffect='none'; return; }
  if (pageType==='BP' && sz!=='BP') { e.dataTransfer.dropEffect='none'; return; }
  if (pageType==='any' && (sz==='FC'||sz==='BP')) { e.dataTransfer.dropEffect='none'; return; }
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
}

function slotDrop(e, zId, si, side, pageType, half) {
  e.preventDefault(); e.stopPropagation();
  const art = BANK_DRAG;
  if (!art) return;
  si = parseInt(si);
  pageType = pageType || 'any';

  if (art.size==='2P') { spreadDrop(e, zId, si); return; }
  if (pageType==='FC' && art.size!=='FC') { showToast('Front Cover: FC ads only',true); return; }
  if (pageType==='BP' && art.size!=='BP') { showToast('Back Page: BP ads only',true); return; }
  if (pageType==='any' && (art.size==='FC'||art.size==='BP')) { showToast(art.size+' only goes on cover pages',true); return; }

  const sp = layouts[zId].spreads[si];

  if (art.size==='HP') {
    if (half) {
      if (!sp[side] || sp[side].type!=='hp-pair') sp[side]={ type:'hp-pair', left:null, right:null };
      if (sp[side][half] && sp[side][half]!==art) bumpBack(sp[side][half]);
      sp[side][half] = art;
    } else {
      const cur = sp[side];
      if (!cur || cur.type!=='hp-pair') {
        if (cur && cur.id) bumpBack(cur);
        sp[side] = { type:'hp-pair', left:art, right:null };
      } else {
        if (!cur.left)       cur.left  = art;
        else if (!cur.right) cur.right = art;
        else { bumpBack(cur.left); cur.left = art; }
      }
    }
  } else {
    // FP/FC/BP
    const existing = sp[side];
    if (existing && existing!==art) {
      if (existing.type==='hp-pair') { bumpBack(existing.left); bumpBack(existing.right); }
      else bumpBack(existing);
    }
    sp[side] = art;
  }

  BANK_DRAG = null;
  refreshLayout();
}

function spreadDragOver(e) {
  if (!BANK_DRAG || BANK_DRAG.size!=='2P') return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
}

function spreadDrop(e, zId, si) {
  e.preventDefault(); e.stopPropagation();
  const art = BANK_DRAG;
  if (!art || art.size!=='2P') return;
  si = parseInt(si);
  const totalSpreads = layouts[zId].spreads.length;
  if (si===0 || si===totalSpreads-1) { showToast('2P cannot go on FC or BP pages',true); return; }
  const sp = layouts[zId].spreads[si];
  if (sp.left)  { if (sp.left.type==='hp-pair')  { bumpBack(sp.left.left);  bumpBack(sp.left.right);  } else bumpBack(sp.left);  }
  if (sp.right) { if (sp.right.type==='hp-pair') { bumpBack(sp.right.left); bumpBack(sp.right.right); } else bumpBack(sp.right); }
  layouts[zId].spreads[si] = { left:art, right:null };
  BANK_DRAG = null;
  refreshLayout();
}

function selectArt(artId) {
  const art = allArtwork.find(function(a){ return a.id===artId; });
  if (!art) return;
  if (SEL && SEL.art === art) { SEL = null; renderArtPanel(); renderSpreads(); return; } // deselect
  SEL = { art:art, isPlaced:false, fromZone:null, fromSpread:null, fromSide:null, fromHalf:null };
  showToast('Selected: '+art.business+' ['+art.size+'] — click a page slot to place', false);
  renderArtPanel();
  renderSpreads();
}

function selectPlaced(zId, si, side, half) {
  si = parseInt(si);
  const sp = layouts[zId] && layouts[zId].spreads[si];
  if (!sp) return;
  let art = null;
  if (half) {
    art = sp[side] && sp[side].type==='hp-pair' ? sp[side][half] : null;
  } else {
    art = sp[side] && sp[side].type!=='hp-pair' ? sp[side] : null;
  }
  if (!art) return;

  if (SEL && SEL.art === art) { SEL = null; renderSpreads(); renderArtPanel(); return; } // deselect

  SEL = { art:art, isPlaced:true, fromZone:zId, fromSpread:si, fromSide:side, fromHalf:half||null };
  showToast('Selected: '+art.business+' ['+art.size+'] — click target slot to move', false);
  renderSpreads();
  renderArtPanel();
}

function placeSelected(zId, si, side, pageType, half) {
  if (!SEL) return;
  si = parseInt(si);
  const art = SEL.art;
  pageType = pageType || 'any';

  // Validate page type
  if (art.size==='2P') { place2PSelected(zId, si); return; }
  if (pageType==='FC' && art.size!=='FC') { showToast('Front Cover: only FC ads',true); return; }
  if (pageType==='BP' && art.size!=='BP') { showToast('Back Page: only BP ads',true); return; }
  if (pageType==='any' && (art.size==='FC'||art.size==='BP')) { showToast(art.size+' only goes on cover pages',true); return; }

  // HP going to a whole page side: use half if specified, else left
  if (art.size==='HP' && half) {
    placeHP(zId, si, side, half);
    return;
  }

  const sp = layouts[zId].spreads[si];
  const existing = sp[side];

  if (art.size==='HP') {
    // Dropping HP on blank page - always go to left half first
    clearSELSource();
    if (!sp[side] || sp[side].type!=='hp-pair') {
      if (sp[side] && sp[side].id) bumpBack(sp[side]);
      sp[side] = { type:'hp-pair', left:art, right:null };
    } else {
      if (!sp[side].left)       sp[side].left  = art;
      else if (!sp[side].right) sp[side].right = art;
      else { bumpBack(sp[side].left); sp[side].left = art; }
    }
  } else {
    // FP/FC/BP
    clearSELSource();
    if (existing && existing !== art) {
      if (existing.type==='hp-pair') { bumpBack(existing.left); bumpBack(existing.right); }
      else bumpBack(existing);
    }
    sp[side] = art;
  }

  SEL = null;
  refreshLayout();
}

function placeHP(zId, si, pageSide, half) {
  if (!SEL || SEL.art.size!=='HP') return;
  si = parseInt(si);
  const art = SEL.art;
  const sp  = layouts[zId].spreads[si];

  const existing = sp[pageSide] && sp[pageSide].type==='hp-pair' ? sp[pageSide][half] : null;
  clearSELSource();

  const tgt = layouts[zId].spreads[si];
  if (!tgt[pageSide] || tgt[pageSide].type!=='hp-pair') {
    tgt[pageSide] = { type:'hp-pair', left:null, right:null };
  }
  if (tgt[pageSide][half] && tgt[pageSide][half] !== art) bumpBack(tgt[pageSide][half]);
  tgt[pageSide][half] = art;

  SEL = null;
  refreshLayout();
}

function place2PSelected(zId, si) {
  if (!SEL || SEL.art.size!=='2P') {
    if (SEL) showToast('Select a 2P spread ad first, then click a spread',true);
    return;
  }
  si = parseInt(si);
  const totalSpreads = layouts[zId].spreads.length;
  if (si===0 || si===totalSpreads-1) { showToast('2P cannot go on FC or BP pages',true); return; }

  const art = SEL.art;
  const sp  = layouts[zId].spreads[si];
  if (sp.left)  { if (sp.left.type==='hp-pair')  { bumpBack(sp.left.left);  bumpBack(sp.left.right);  } else bumpBack(sp.left);  }
  if (sp.right) { if (sp.right.type==='hp-pair') { bumpBack(sp.right.left); bumpBack(sp.right.right); } else bumpBack(sp.right); }
  clearSELSource();
  layouts[zId].spreads[si] = { left:art, right:null };

  SEL = null;
  refreshLayout();
}

function clearSELSource() {
  if (!SEL || !SEL.isPlaced) return;
  const layout = layouts[SEL.fromZone];
  if (!layout) return;
  const sp = layout.spreads[SEL.fromSpread];
  if (!sp) return;
  if (SEL.fromHalf) {
    if (sp[SEL.fromSide] && sp[SEL.fromSide].type==='hp-pair') {
      sp[SEL.fromSide][SEL.fromHalf] = null;
      if (!sp[SEL.fromSide].left && !sp[SEL.fromSide].right) sp[SEL.fromSide] = null;
    }
  } else {
    sp[SEL.fromSide] = null;
  }
}

function bumpBack(art) { /* art returns to panel automatically via getPlacedIds */ }

// Legacy no-ops for any remaining references
function onArtDrag(){}
function onArtDragEnd(){}
function placedDragStartEl(){}
function placedDragStart(){}
function getDragArt(){ return SEL ? SEL.art : null; }
// DRAG, isDragging, dragItem declared above

function removeSlot(zId, si, side) {
  layouts[zId].spreads[si][side] = null;
  refreshLayout();
}

function removeHp(zId, si, pageSide, half) {
  const pair = layouts[zId].spreads[si][pageSide];
  if (pair && pair.type==='hp-pair') {
    pair[half] = null;
    if (!pair.left && !pair.right) layouts[zId].spreads[si][pageSide] = null;
  }
  refreshLayout();
}

function refreshLayout() {
  // Don't clear DRAG here - it needs to persist
  isDragging = false;
  dragItem   = null;
  renderSpreads();
  renderArtPanel();
}

// ── Pages ─────────────────────────────────────────────────────────────────────
function addPgs() {
  const l = layouts[activeZone];
  l.pages += 4;
  // Insert 2 new spreads before the BP slot (last element)
  const bp = l.spreads.pop();
  l.spreads.push({left:null,right:null});
  l.spreads.push({left:null,right:null});
  l.spreads.push(bp);
  refreshLayout();
}

function removePgs() {
  const l = layouts[activeZone];
  if (l.pages <= 8) { showToast('Minimum 8 pages', true); return; }
  // Remove 2 interior spreads before BP slot
  const len = l.spreads.length;
  if (len < 4) { showToast('Cannot remove more pages', true); return; }
  const toRemove = [l.spreads[len-3], l.spreads[len-2]];
  const hasAds = toRemove.some(function(sp){ return sp&&(sp.left||sp.right); });
  if (hasAds && !confirm('These pages have ads. Remove anyway?')) return;
  toRemove.forEach(function(sp){
    if (!sp) return;
    ['left','right'].forEach(function(s){
      if (!sp[s]) return;
      if (sp[s].type==='hp-pair') { bumpBack(sp[s].left); bumpBack(sp[s].right); }
      else bumpBack(sp[s]);
    });
  });
  l.spreads.splice(len-3, 2);
  l.pages -= 4;
  refreshLayout();
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveLayout() {
  if (!curMonth) { showToast('Load a month first', true); return; }
  try {
    const res = await fetch(API+'/saveLayoutData',{
      method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',
      body:JSON.stringify({month:curMonth,year:curYear,layout:layouts})
    });
    if (!res.ok) throw new Error('Save failed');
    showToast('Layout saved!', false);
  } catch(e){ showToast('Error: '+e.message, true); }
}

// ── Email Designer ────────────────────────────────────────────────────────────
async function emailDesigner() {
  if (!activeZone) return;
  const l    = layouts[activeZone];
  const zone = zones.find(function(z){return z.id===activeZone;});
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const mLabel = MONTHS[parseInt(curMonth)-1]+' '+curYear;

  let pageList = '';
  const totalSp = l.spreads.length;
  l.spreads.forEach(function(sp, si){
    if (si === 0) {
      pageList += 'Page 1 (Front Cover): '+slotText(sp.left)+'\n';
    } else if (si === totalSp-1) {
      const lastPg = (totalSp-1)*2;
      pageList += 'Page '+lastPg+' (Back Page): '+slotText(sp.right)+'\n';
    } else {
      const p1 = si*2, p2 = si*2+1;
      if (sp.left && sp.left.size==='2P') {
        pageList += 'Pages '+p1+'-'+p2+': [2P SPREAD] '+sp.left.business+' ('+sp.left.filename+')\n';
      } else {
        pageList += 'Page '+p1+' (Left):  '+slotText(sp.left)+'\n';
        pageList += 'Page '+p2+' (Right): '+slotText(sp.right)+'\n';
      }
    }
  });

  try {
    const res = await fetch(API+'/sendLayoutEmail',{
      method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',
      body:JSON.stringify({
        to: settings.designerEmail||'sherry.workofheart@gmail.com',
        toName: settings.designerName||'Sherry',
        zone: activeZone, zoneName: zone?zone.name:activeZone,
        month: mLabel, pageList, totalPages: l.pages
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error||'Failed');
    showToast('Emailed to '+(settings.designerName||'Sherry')+'!', false);
  } catch(e){ showToast('Error: '+e.message, true); }
}

function slotText(slot) {
  if (!slot) return '(empty)';
  if (slot.type==='hp-pair') {
    const l = slot.left  ? slot.left.business+' [HP]'  : '(empty HP)';
    const r = slot.right ? slot.right.business+' [HP]' : '(empty HP)';
    return l+'  |  '+r;
  }
  return slot.business+' ['+slot.size+'] ('+slot.filename+')';
}

async function logout() {
  await fetch(API+'/authLogout',{method:'POST',credentials:'include'});
  sessionStorage.clear(); window.location.href='/';
}

function showToast(msg, isErr) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(isErr===true?' err':isErr===false?' ok':'');
  setTimeout(function(){t.className='toast';},3000);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

init();
</script>
