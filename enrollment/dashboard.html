<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Texan Local — Enrollment Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--bg:#dde0e6;--md:#4a4f5e;--br:#c8cdd8;--green:#1a5c1a;--amber:#e65100}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

.hdr{background:var(--bl);border-bottom:4px solid var(--rd);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-logo{height:44px}
.hdr-l h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff}
.hdr-r{display:flex;gap:10px;align-items:center}
.btn-hdr{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 14px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.btn-hdr:hover{background:rgba(255,255,255,.2)}
.btn-new{background:var(--rd);color:#fff;border:none;padding:7px 16px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.btn-new:hover{background:#a00a34}

.main{max-width:1400px;margin:0 auto;padding:1.5rem;flex:1;width:100%}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:1.2rem}
.stat-card{background:#fff;border-radius:8px;padding:.9rem 1.1rem;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--bl);line-height:1}
.stat-card .lbl{font-size:11px;color:var(--md);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.controls input,.controls select{padding:6px 10px;border:1px solid var(--br);border-radius:4px;font-size:13px;font-family:inherit;outline:none;background:#fff}
.controls input:focus,.controls select:focus{border-color:var(--rd)}
.controls input{flex:1;min-width:180px}
.btn-refresh{background:var(--bl);color:#fff;border:none;padding:6px 14px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* Table */
.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bl)}
th{color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafc}

/* Badges */
.badge{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge-sent{background:#e3f2fd;color:#1565c0}
.badge-opened{background:#fff3e0;color:var(--amber)}
.badge-signed{background:#e8f5e9;color:var(--green)}
.badge-awaiting{background:#fff8e1;color:#f57f17}
.badge-inperson{background:#f3e5f5;color:#6a1b9a}

/* Buttons */
.btn-sm{padding:4px 10px;border-radius:3px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:2px}
.btn-view{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.btn-pdf{background:#e8f5e9;color:var(--green);border:1px solid #a5d6a7}
.btn-resend{background:#fff3e0;color:var(--amber);border:1px solid #ffcc80}
.btn-resend:hover{background:#ffe0b2}
.btn-countersign{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
.btn-del{background:#ffebee;color:var(--rd);border:1px solid #ffcdd2}

.empty-state{padding:3rem;text-align:center;color:var(--md)}
.last-updated{font-size:11px;color:var(--md);margin-left:auto}

/* Tabs */
.tabs{display:flex;gap:0;background:#fff;border-radius:8px 8px 0 0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:0}
.tab{flex:1;padding:.65rem 1rem;font-size:12px;font-weight:700;color:var(--md);cursor:pointer;border-right:1px solid var(--br);text-align:center;border:none;background:transparent;font-family:inherit;transition:all .15s}
.tab:last-child{border-right:none}
.tab.active{background:var(--bl);color:#fff}
.tab .cnt{display:inline-block;background:rgba(0,0,0,.15);border-radius:10px;padding:0 6px;font-size:10px;margin-left:4px}
.tab.active .cnt{background:rgba(255,255,255,.2)}

.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.err{background:var(--rd)}

/* View modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:2rem;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:8px;width:100%;max-width:680px;box-shadow:0 8px 40px rgba(0,0,0,.3);overflow:hidden}
.modal-hdr{background:var(--bl);padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
.modal-hdr span{color:#fff;font-size:14px;font-weight:700}
.modal-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
.modal-body{padding:20px;max-height:80vh;overflow-y:auto}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <img class="hdr-logo" src="/assets/logo.png" alt="The Texan Local" onerror="this.style.display='none'">
    <h1>Enrollment Dashboard</h1>
  </div>
  <div class="hdr-r">
    <a href="/enrollment" class="btn-new">+ Send New Enrollment Form</a>
    <a href="/home" class="btn-hdr">← Portal Home</a>
    <button class="btn-hdr" onclick="logout()">Sign Out</button>
  </div>
</header>

<div class="main">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-total">—</div><div class="lbl">Total Sent</div></div>
    <div class="stat-card"><div class="num" id="stat-signed" style="color:var(--green)">—</div><div class="lbl">Signed</div></div>
    <div class="stat-card"><div class="num" id="stat-pending" style="color:var(--amber)">—</div><div class="lbl">Awaiting</div></div>
    <div class="stat-card"><div class="num" id="stat-opened" style="color:#1565c0">—</div><div class="lbl">Opened</div></div>
    <div class="stat-card"><div class="num" id="stat-sent" style="color:var(--md)">—</div><div class="lbl">Not Opened</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-all"     onclick="setTab('all')">All <span class="cnt" id="cnt-all">0</span></button>
    <button class="tab"        id="tab-pending"  onclick="setTab('pending')">Awaiting Signature <span class="cnt" id="cnt-pending">0</span></button>
    <button class="tab"        id="tab-signed"   onclick="setTab('signed')">Signed <span class="cnt" id="cnt-signed">0</span></button>
    <button class="tab"        id="tab-sent"     onclick="setTab('sent')">Not Opened <span class="cnt" id="cnt-sent">0</span></button>
  </div>

  <!-- Controls -->
  <div style="background:#fff;padding:.8rem 1rem;border-top:1px solid var(--br);border-bottom:1px solid var(--br);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <input type="text" id="searchInput" placeholder="Search business or email…" oninput="renderTable()">
    <select id="repFilter" onchange="renderTable()">
      <option value="">All Reps</option>
    </select>
    <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
    <span class="last-updated" id="lastUpdated"></span>
  </div>

  <!-- Table -->
  <div class="card" style="border-radius:0 0 8px 8px">
    <div class="table-wrap">
      <div id="tableWrap"><div class="empty-state">Loading…</div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let allData   = [];
let activeTab = 'all';
let dashKey   = '';

async function init() {
  const token = sessionStorage.getItem('txl_token');
  const res   = await fetch(API + '/authVerify' + (token ? '?token=' + token : ''), { credentials: 'include' });
  if (!res.ok) { window.location.href = '/'; return; }
  const user = await res.json();
  if (user.role !== 'admin') { window.location.href = '/home'; return; }
  dashKey = token || '';
  await loadData();
  setInterval(loadData, 60000);
}

async function loadData() {
  try {
    const res  = await fetch(API + '/getDashboard?token=' + encodeURIComponent(dashKey), { credentials: 'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Load failed');
    allData = Array.isArray(data) ? data : [];
    updateStats();
    updateTabs();
    populateRepFilter();
    renderTable();
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty-state">Error loading data: ' + esc(e.message) + '</div>';
  }
}

function updateStats() {
  const signed  = allData.filter(function(r) { return r.status === 'signed' || r.status === 'inperson'; }).length;
  const pending = allData.filter(function(r) { return r.status === 'client_signed'; }).length;
  const opened  = allData.filter(function(r) { return r.status === 'opened'; }).length;
  const sent    = allData.filter(function(r) { return r.status === 'sent'; }).length;
  document.getElementById('stat-total').textContent   = allData.length;
  document.getElementById('stat-signed').textContent  = signed;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-opened').textContent  = opened;
  document.getElementById('stat-sent').textContent    = sent;
}

function updateTabs() {
  const signed  = allData.filter(function(r) { return r.status === 'signed' || r.status === 'inperson'; }).length;
  const pending = allData.filter(function(r) { return r.status === 'client_signed'; }).length;
  const sent    = allData.filter(function(r) { return r.status === 'sent'; }).length;
  document.getElementById('cnt-all').textContent     = allData.length;
  document.getElementById('cnt-signed').textContent  = signed;
  document.getElementById('cnt-pending').textContent = pending;
  document.getElementById('cnt-sent').textContent    = sent;
}

function populateRepFilter() {
  const reps = [...new Set(allData.map(function(r) { return r.rep || r.formData && r.formData.rep || ''; }).filter(Boolean))].sort();
  const sel  = document.getElementById('repFilter');
  const cur  = sel.value;
  sel.innerHTML = '<option value="">All Reps</option>';
  reps.forEach(function(r) {
    var o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  renderTable();
}

function getFiltered() {
  const q   = (document.getElementById('searchInput').value || '').toLowerCase();
  const rep = document.getElementById('repFilter').value;
  return allData.filter(function(r) {
    const biz   = (r.bizName || r.formData && r.formData.bizName || '').toLowerCase();
    const email = (r.clientEmail || '').toLowerCase();
    const rRep  = r.rep || r.formData && r.formData.rep || '';
    const isSigned  = r.status === 'signed' || r.status === 'inperson';
    const isPending = r.status === 'client_signed';
    const isSent    = r.status === 'sent';

    if (activeTab === 'signed'  && !isSigned)  return false;
    if (activeTab === 'pending' && !isPending)  return false;
    if (activeTab === 'sent'    && !isSent)     return false;
    if (q && !biz.includes(q) && !email.includes(q)) return false;
    if (rep && rRep !== rep) return false;
    return true;
  });
}

function renderTable() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty-state">No records found</div>';
    return;
  }

  var html = '<table><thead><tr>' +
    '<th>Rep</th><th>Business</th><th>Email</th><th>Term</th><th>Monthly</th>' +
    '<th>Sent</th><th>Opened</th><th>Signed</th><th>Status</th><th>Actions</th>' +
    '</tr></thead><tbody>';

  filtered.forEach(function(r) {
    const fd       = r.formData || {};
    const biz      = esc(r.bizName || fd.bizName || '—');
    const email    = esc(r.clientEmail || '');
    const rep      = esc(r.rep || fd.rep || '—');
    const term     = esc(r.term || fd.term || '—');
    const monthly  = r.monthly || fd.monthly || '—';
    const sid      = r.sessionId;
    const isSigned = r.status === 'signed' || r.status === 'inperson';
    const isAwait  = r.status === 'client_signed';
    const isIP     = r.status === 'inperson';

    var badgeClass = 'badge-sent';
    var badgeLabel = 'Sent';
    if (isSigned)         { badgeClass = isIP ? 'badge-inperson' : 'badge-signed'; badgeLabel = isIP ? 'In-Person' : 'Signed'; }
    else if (isAwait)     { badgeClass = 'badge-awaiting'; badgeLabel = 'Awaiting Rep'; }
    else if (r.status === 'opened') { badgeClass = 'badge-opened'; badgeLabel = 'Opened'; }

    var actions = '';
    if (isSigned) actions += '<button class="btn-sm btn-view"  onclick="viewDoc(\'' + sid + '\')">&#128196; View</button>';
    if (isSigned) actions += '<button class="btn-sm btn-pdf"   onclick="getPdf(\'' + sid + '\')">&#128438; PDF</button>';
    if (isAwait)  actions += '<button class="btn-sm btn-countersign" onclick="countersign(\'' + sid + '\')">&#9998; Countersign</button>';
    if (!isSigned && !isAwait) actions += '<button class="btn-sm btn-resend" onclick="resend(\'' + sid + '\', this)">&#8635; Resend</button>';
    actions += '<button class="btn-sm btn-del" onclick="deleteRecord(\'' + sid + '\', \'' + biz + '\')">&#128465;</button>';

    // Booking status indicator (only for signed agreements)
    var bookingBadge = '';
    if (isSigned) {
      if (r.bookingContractId) {
        bookingBadge = '<div style="margin-top:4px"><span style="background:#e8f5e9;color:#1a5c1a;border:1px solid #a5d6a7;border-radius:3px;font-size:10px;font-weight:700;padding:1px 6px">✓ Booked</span></div>';
      } else {
        bookingBadge = '<div style="margin-top:4px"><span style="background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:3px;font-size:10px;font-weight:700;padding:1px 6px">⚠ No Booking</span>'
          + '&nbsp;<button class="btn-sm" style="background:#e65100;color:#fff;border:none;font-size:10px;padding:1px 7px" onclick="retryBooking(\'' + sid + '\', this)">↩ Retry</button></div>';
      }
    }

    html += '<tr>' +
      '<td style="font-weight:700;color:var(--bl)">' + rep + '</td>' +
      '<td><strong>' + biz + '</strong></td>' +
      '<td style="font-size:11px;color:var(--md)">' + email + '</td>' +
      '<td style="font-size:11px">' + term + '</td>' +
      '<td style="font-weight:700">' + monthly + '</td>' +
      '<td style="font-size:11px;white-space:nowrap">' + fmt(r.createdAt) + '</td>' +
      '<td style="font-size:11px;white-space:nowrap;color:' + (r.openedAt ? 'var(--amber)' : '#aaa') + '">' + (r.openedAt ? fmt(r.openedAt) : '—') + '</td>' +
      '<td style="font-size:11px;white-space:nowrap;color:var(--green)">' + (isSigned ? '✓ ' + fmt(r.signedAt) : '—') + '</td>' +
      '<td><span class="badge ' + badgeClass + '">' + badgeLabel + '</span>' + bookingBadge + '</td>' +
      '<td style="white-space:nowrap">' + actions + '</td>' +
      '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

async function retryBooking(sessionId, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res  = await fetch('/api/createBookingFromEnrollment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ sessionId })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    if (data.alreadyExists) {
      showToast('Booking already exists for this enrollment', false);
    } else {
      showToast('✓ Booking created! ' + (data.bookingsCreated||0) + ' monthly slots', false);
    }
    await loadData(); // Refresh table to show updated status
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '↩ Retry';
    showToast('Retry failed: ' + e.message, true);
  }
}

function showToast(msg, isErr) {
  var t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = isErr ? '#BF0D3E' : '#1a5c1a';
  t.style.opacity = '1';
  setTimeout(function(){ t.style.opacity = '0'; }, 3500);
}
  var r = allData.find(function(x){ return x.sessionId === sessionId; });
  if (!r || !r.signed) { alert('Signed document data not available.'); return; }
  var s = r.signed;
  function row2(label, val) {
    return '<tr><td style="padding:6px 10px;font-weight:700;color:#4a4f5e;background:#edf0f7;border:1px solid #c8cdd8;width:35%;font-size:12px;">'+label+'</td>'
      +'<td style="padding:6px 10px;background:#fff;border:1px solid #c8cdd8;font-size:12px;">'+(val||'—')+'</td></tr>';
  }
  var payRows = '';
  if (s.payDetail) {
    var parts = s.payDetail.split('|');
    if (s.payMethod && s.payMethod.includes('Credit Card')) {
      payRows = row2('Card Type',parts[0]||'') + row2('Card Number',parts[1]||'') + row2('Name on Card',parts[2]||'')
              + row2('Expiration',parts[3]?parts[3].replace('Exp:',''):'') + row2('CVV',parts[4]?parts[4].replace('CVV:',''):'')
              + row2('Billing',parts[5]?parts[5].replace('Billing:',''):'');
    } else {
      payRows = row2('Routing',parts[0]?parts[0].replace('Routing:',''):'') + row2('Account',parts[1]?parts[1].replace('Account:',''):'')
              + row2('Type',parts[2]?parts[2].replace('Type:',''):'') + row2('Holder',parts[3]?parts[3].replace('Holder:',''):'');
    }
  }
  var auditRows = '';
  if (r.auditTrail) r.auditTrail.forEach(function(a){
    auditRows += row2(a.event.replace(/_/g,' ').toUpperCase(), fmt(a.timestamp)+(a.ip?' | IP: '+a.ip:'')+' — '+a.detail);
  });
  var fd = r.formData || {};
  var html = '<div style="font-family:Arial,sans-serif;color:#1a1a2e;">'
    +'<div style="background:#1a5c1a;color:#fff;padding:10px 16px;border-radius:5px;font-size:13px;font-weight:700;margin-bottom:18px;">&#10003; SIGNED — '+esc(r.bizName||'')+'</div>'
    +'<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;"><tr><td colspan="2" style="background:#00205B;color:#fff;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;">Client Information</td></tr>'
    +row2('Business',r.bizName)+row2('Email',r.clientEmail)+row2('Address',[fd.addr,fd.city,fd.state,fd.zip].filter(Boolean).join(', '))+row2('Phone',fd.phone)+row2('Term',fd.term)+row2('Notes',fd.notes)+'</table>'
    +'<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;"><tr><td colspan="2" style="background:#00205B;color:#fff;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;">Agreement Summary</td></tr>'
    +row2('Subtotal',s.subtotal)+row2('First Month',s.firstMonth)+row2('Monthly',s.monthly)+row2('Initials',s.initials)+'</table>'
    +'<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;"><tr><td colspan="2" style="background:#BF0D3E;color:#fff;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;">Payment — CONFIDENTIAL</td></tr>'
    +row2('Method',s.payMethod)+payRows+'</table>'
    +'<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;"><tr><td colspan="2" style="background:#00205B;color:#fff;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;">Signature</td></tr>'
    +row2('Signed By',s.sigName+(s.sigTitle?', '+s.sigTitle:''))+row2('Date',s.signedDate)+row2('IP',s.ipAddress)+'</table>'
    +'<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;"><tr><td colspan="2" style="background:#1a5c1a;color:#fff;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;">ESIGN / UETA</td></tr>'
    +row2('Consent',s.consentText)+row2('Consent At',fmt(s.consentAt))+row2('Email Verified',fmt(r.verifiedAt))
    +row2('SHA-256','<span style="font-family:monospace;font-size:10px;word-break:break-all;">'+(r.auditHash||'')+'</span>')+'</table>'
    +(auditRows ? '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;"><tr><td colspan="2" style="background:#333;color:#fff;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;">Audit Trail</td></tr>'+auditRows+'</table>' : '')
    +'<p style="font-size:10px;color:#888;text-align:center;padding-top:10px;border-top:1px solid #dde2ef;">Executed under the federal ESIGN Act and UETA.</p></div>';

  document.getElementById('docModalTitle').textContent = 'Signed Agreement — ' + (r.bizName||'');
  document.getElementById('docModalBody').innerHTML = html;
  document.getElementById('docModal').classList.add('show');
}

function closeDocModal() {
  document.getElementById('docModal').classList.remove('show');
}

function getPdf(sid) {
  window.open('/api/getPdf?id=' + sid + '&token=' + encodeURIComponent(dashKey), '_blank');
}

function countersign(sid) {
  window.open('/countersign?id=' + sid + '&token=' + encodeURIComponent(dashKey), '_blank');
}

async function resend(sid, btn) {
  var r = allData.find(function(x) { return x.sessionId === sid; });
  if (!r) return;
  if (!confirm('Resend enrollment email to ' + (r.bizName || r.clientEmail) + '?\n\nThis will resend the same signing link — no new record will be created.')) return;
  btn.disabled = true; btn.textContent = '⏳';
  try {
    // Use resendEnrollment endpoint - resends email for existing record, no new record
    const res = await fetch(API + '/resendEnrollment', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
      body: JSON.stringify({ sessionId: sid, token: dashKey })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      btn.textContent = '✓ Sent';
      btn.style.background = '#e8f5e9'; btn.style.color = 'var(--green)';
      showToast('Email resent to ' + (r.bizName || r.clientEmail));
      setTimeout(function(){ loadData(); }, 2000);
    } else {
      btn.disabled = false; btn.textContent = '↻ Resend';
      showToast(data.error || 'Resend failed', true);
    }
  } catch(e) { btn.disabled = false; btn.textContent = '↻ Resend'; showToast(e.message, true); }
}

async function deleteRecord(sid, biz) {
  if (!confirm('Move ' + biz + ' to trash?')) return;
  try {
    const res = await fetch(API + '/getDashboard?token=' + encodeURIComponent(dashKey) + '&action=soft&id=' + sid, {
      method: 'POST', credentials: 'include'
    });
    if (res.ok) { showToast('Moved to trash'); await loadData(); }
    else showToast('Delete failed', true);
  } catch(e) { showToast(e.message, true); }
}

async function logout() {
  await fetch(API + '/authLogout', { method: 'POST', credentials: 'include' });
  sessionStorage.clear(); window.location.href = '/';
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', year:'2-digit', hour:'numeric', minute:'2-digit' });
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(function() { t.className = 'toast'; }, 3500);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>

<!-- View Document Modal -->
<div class="modal-overlay" id="docModal" onclick="if(event.target===this)closeDocModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <span id="docModalTitle">Signed Agreement</span>
      <button class="modal-close" onclick="closeDocModal()">✕</button>
    </div>
    <div class="modal-body" id="docModalBody"></div>
  </div>
</div>

</body>
