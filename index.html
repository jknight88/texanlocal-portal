<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Texan Local — Staff Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#00205B;--rd:#BF0D3E;--bg:#dde0e6;--md:#4a4f5e;--br:#c8cdd8}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

.hdr{background:var(--bl);border-bottom:4px solid var(--rd);padding:1rem 2rem;display:flex;align-items:center;gap:16px}
.hdr-logo{height:44px}
.hdr h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff;opacity:.85}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}

.login-box{background:#fff;border-radius:10px;width:100%;max-width:400px;box-shadow:0 6px 32px rgba(0,0,0,.15);overflow:hidden}
.login-hdr{background:var(--bl);padding:1.4rem 1.8rem;border-bottom:3px solid var(--rd)}
.login-hdr h2{font-family:'Playfair Display',serif;color:#fff;font-size:18px;margin-bottom:4px}
.login-hdr p{font-size:12px;color:rgba(255,255,255,.6)}
.login-body{padding:1.8rem}

.field{margin-bottom:1.2rem}
.field label{display:block;font-size:11px;font-weight:700;color:var(--md);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.field input{width:100%;border:none;border-bottom:2px solid var(--br);background:transparent;font-size:14px;font-family:inherit;padding:7px 2px;outline:none;transition:border-color .15s}
.field input:focus{border-bottom-color:var(--rd)}

.btn-login{width:100%;background:var(--bl);color:#fff;border:none;padding:12px;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:.4rem}
.btn-login:hover{background:#001844}
.btn-login:disabled{opacity:.6;cursor:not-allowed}

.msg{font-size:12px;margin-top:10px;padding:8px 10px;border-radius:4px;display:none}
.msg.err{background:#fff0f0;color:var(--rd);border:1px solid #ffcccc;display:block}
.msg.info{background:#f0f4ff;color:var(--bl);border:1px solid #c0ccff;display:block}

.ftr{text-align:center;padding:1.2rem;font-size:11px;color:#888}
</style>
</head>
<body>

<header class="hdr">
  <img class="hdr-logo" src="/assets/logo.png" alt="The Texan Local" onerror="this.style.display='none'">
  <h1>Staff Portal</h1>
</header>

<div class="page">
  <div class="login-box">
    <div class="login-hdr">
      <h2>Sign In</h2>
      <p>Texan Local internal portal</p>
    </div>
    <div class="login-body">
      <form onsubmit="simpleLogin(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <div style="position:relative">
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" style="width:100%;padding-right:40px">
            <button type="button" onclick="togglePwd()" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:13px">👁</button>
          </div>
        </div>
        <div id="msg" class="msg"></div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>
    </div>
  </div>
</div>

<div class="ftr">The Texan Local &nbsp;·&nbsp; Internal Use Only</div>

<script>
const BASE_URL = window.location.origin;

async function checkAuth() {
  try {
    const token = sessionStorage.getItem('txl_token');
    if (!token) return;
    const res = await fetch('/api/authVerify?token=' + token, { credentials: 'include' });
    if (res.ok) {
      redirectByRole((await res.json()).role);
    } else {
      sessionStorage.removeItem('txl_token');
      sessionStorage.removeItem('txl_user');
    }
  } catch(e) {}
}

function redirectByRole(role) {
  window.location.href = '/home';
}

async function simpleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');

  if (!username || !password) { showMsg('Please enter your username and password.', 'err'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  hideMsg();

  try {
    const res  = await fetch('/api/authLogin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      showMsg(data.error || 'Invalid username or password.', 'err');
    } else {
      sessionStorage.setItem('txl_token', data.token);
      sessionStorage.setItem('txl_user', JSON.stringify({ name: data.name, role: data.role, username: data.username }));
      redirectByRole(data.role);
    }
  } catch(err) {
    showMsg('Connection error. Please try again.', 'err');
  }

  btn.disabled = false;
  btn.textContent = 'Sign In';
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}

function hideMsg() {
  const m = document.getElementById('msg');
  m.className = 'msg';
}

function togglePwd() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
}

checkAuth();
</script>
</body>
</html>
